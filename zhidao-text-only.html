<title>习概知到考点｜纯文字刷题版</title>
<style>
:root{--bg:#f7f1e8;--card:#fffaf2;--ink:#2b2118;--muted:#7b6b5c;--line:#eadfce;--accent:#9f2d2d;--accent2:#c96f55;--ok:#1f8a4c;--bad:#b3261e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
button,select,input{font:inherit;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);padding:10px 14px}
button{cursor:pointer}button:active{transform:translateY(1px)}
.app{max-width:920px;margin:0 auto;padding:16px 14px 88px}
header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
h1{font-size:22px;margin:0 0 6px;letter-spacing:.03em}
.sub{font-size:13px;color:var(--muted);line-height:1.55}
.iconbtn{width:48px;height:44px;border-radius:999px;background:#fffaf2;font-size:18px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 28px rgba(70,45,20,.10);min-height:calc(100vh - 190px);transition:.16s}
.card.slideL{transform:translateX(-18px);opacity:.6}.card.slideR{transform:translateX(18px);opacity:.6}
.meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:14px;margin-bottom:10px}
.tag{background:#f1e4d3;color:#6c3b2c;border-radius:999px;padding:5px 10px}
.progress{height:8px;background:#eadfce;border-radius:999px;overflow:hidden;margin:8px 0 16px}
#bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.2s}
.qtext{font-size:19px;line-height:1.75;white-space:pre-wrap;margin:0 0 18px;font-weight:650}
.options{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.opt{font-size:18px;font-weight:800;color:var(--accent);min-height:48px}
.opt.selected{border-color:var(--accent);background:#fff1e9}
.opt.correct{border-color:var(--ok);background:#eef9f2;color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#fff0ed;color:var(--bad)}
.feedback{display:none;margin-top:16px;padding:14px;border-radius:16px;line-height:1.65;white-space:pre-wrap}
.feedback.good{display:block;background:#eef9f2;border:1px solid #abd8bb;color:#124b2b}
.feedback.bad{display:block;background:#fff0ed;border:1px solid #f0b6ac;color:#5f130e}
.panel{display:none;background:#fffaf2;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
.panel.show{display:block}
.panelrow{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.panelrow > *{flex:1 1 140px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stats div{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px;text-align:center}
.stats b{display:block;color:var(--accent);font-size:20px}
.stats span{font-size:12px;color:var(--muted)}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;display:flex;justify-content:space-between;gap:10px;padding:12px 14px max(12px,env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(247,241,232,.96))}
.bottom button{flex:1;max-width:180px;color:var(--accent);font-weight:700;background:#fffaf2;border-color:rgba(159,45,45,.25);box-shadow:0 6px 18px rgba(70,45,20,.12)}
.note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}
@media(max-width:560px){.app{padding:12px 12px 84px}h1{font-size:20px}.qtext{font-size:17px}.card{padding:14px}.options{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
const BANK=JSON.parse(document.getElementById('data').textContent);let idx=0,mode='all',locked=false;let selected=new Set();
let state=JSON.parse(localStorage.getItem('zhidaoTextState')||'{"results":{},"wrong":[],"order":[]}'); if(!state.order.length)state.order=BANK.map(q=>q.id);

function list(){let arr=state.order.map(byId).filter(Boolean);if(mode==='wrong')arr=arr.filter(q=>state.wrong.includes(q.id));if(mode==='popup')arr=arr.filter(q=>q.source.includes('弹窗'));if(mode==='unit')arr=arr.filter(q=>q.source.includes('单元'));return arr}
function render(){let l=list();selected.clear();locked=false;$('feedback').style.display='none';$('feedback').className='feedback';if(!l.length){$('qtext').textContent='当前列表没有题目。';$('options').innerHTML='';$('tag').textContent='无题';$('count').textContent='0 / 0';return}if(idx>=l.length)idx=0;if(idx<0)idx=l.length-1;let q=l[idx];$('tag').textContent=q.source+' · PDF第'+q.page+'页 · 第'+q.id+'题';$('count').textContent=(idx+1)+' / '+l.length;$('bar').style.width=((idx+1)/l.length*100)+'%';$('qtext').textContent=q.display_text;$('jumpInput').max=l.length;$('jumpInput').value=idx+1;$('options').innerHTML=Object.entries(q.options).map(([k,v])=>`<button class="opt" data-c="${k}">${k}${v!==k?'：'+v:''}</button>`).join('');document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>choose(b.dataset.c,b));updateStats();}
function choose(c,b){if(locked)return;let q=list()[idx];let answer=norm(q.answer); if(answer.length>1){ if(selected.has(c)){selected.delete(c);b.classList.remove('selected')}else{selected.add(c);b.classList.add('selected')} if(selected.size<answer.length)return; c=[...selected].join(''); } judge(c);}
function judge(c){let q=list()[idx];let right=norm(q.answer),pick=norm(c);locked=true;document.querySelectorAll('.opt').forEach(b=>{if(right.includes(b.dataset.c))b.classList.add('correct');if(pick.includes(b.dataset.c)&&!right.includes(b.dataset.c))b.classList.add('wrong')});let ok=pick===right;state.results[q.id]={ok,pick,at:Date.now()};if(ok)state.wrong=state.wrong.filter(x=>x!==q.id);else if(!state.wrong.includes(q.id))state.wrong.push(q.id);save();if(ok){show('回答正确，自动进入下一题。','good');setTimeout(next,450)}else{show('回答错误
正确答案：'+q.answer,'bad')}updateStats();}
function show(t,cls){$('feedback').textContent=t;$('feedback').className='feedback '+cls;$('feedback').style.display='block'}function next(){idx++;slide('slideL')}function prev(){idx--;slide('slideR')}function slide(c){$('card').classList.add(c);setTimeout(()=>{$('card').classList.remove(c);render()},120)}function updateStats(){let vals=Object.values(state.results),r=vals.filter(v=>v.ok).length,w=vals.length-r;$('done').textContent=vals.length;$('right').textContent=r;$('bad').textContent=w;$('rate').textContent=vals.length?Math.round(r/vals.length*100)+'%':'0%'}
$('next').onclick=next;$('prev').onclick=prev;$('wrongBtn').onclick=()=>{mode='wrong';$('mode').value='wrong';idx=0;render()};$('toggle').onclick=()=>$('panel').classList.toggle('show');$('mode').onchange=e=>{mode=e.target.value;idx=0;render()};$('shuffle').onclick=()=>{for(let i=state.order.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[state.order[i],state.order[j]]=[state.order[j],state.order[i]]}save();idx=0;render()};$('reset').onclick=()=>{state={results:{},wrong:[],order:BANK.map(q=>q.id)};save();idx=0;render()};$('showAnswer').onclick=()=>{let q=list()[idx];show('正确答案：'+q.answer,'bad')};$('jump').onclick=()=>{let n=Number($('jumpInput').value);if(n>=1&&n<=list().length){idx=n-1;render()}};document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();let k=e.key.toUpperCase();if(['A','B','C','D'].includes(k)){let b=document.querySelector(`.opt[data-c="${k}"]`);if(b)b.click()}});render();
</script>
