<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#9f2d2d">
  <title>习概客观题刷题卡</title>
<style>

:root{
  --bg:#f7f1e8; --card:#fffaf2; --ink:#2b2118; --muted:#7b6b5c;
  --line:#eadfce; --accent:#9f2d2d; --accent2:#c96f55;
  --ok:#1f8a4c; --bad:#b3261e; --shadow:0 10px 28px rgba(70,45,20,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
body{overscroll-behavior:none}
button,select,input{font:inherit}
button,select,input{
  border:1px solid var(--line);background:#fff;color:var(--ink);
  border-radius:14px;padding:11px 14px;
}
button{cursor:pointer}
button:active{transform:translateY(1px)}
.app{min-height:100vh;padding:14px 14px 88px;max-width:920px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
h1{font-size:22px;margin:4px 0 4px;letter-spacing:.03em}
#subtitle{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
.iconbtn{width:44px;height:44px;border-radius:999px;background:#fffaf2;font-size:22px;line-height:1;padding:0}
.stage{touch-action:pan-y}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:22px;
  padding:18px;box-shadow:var(--shadow);min-height:calc(100vh - 188px);
  transition:transform .18s ease,opacity .18s ease;
}
.card.slideLeft{transform:translateX(-18px);opacity:.55}
.card.slideRight{transform:translateX(18px);opacity:.55}
.meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:14px;margin-bottom:10px}
#typeTag{background:#f1e4d3;color:#6c3b2c;border-radius:999px;padding:5px 10px}
.progress{height:8px;background:#eadfce;border-radius:999px;overflow:hidden;margin:8px 0 18px}
#bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s}
#question{font-size:20px;line-height:1.68;margin:0 0 18px;white-space:pre-wrap}
.options{display:grid;gap:10px}
.opt{
  width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
  border-radius:17px;padding:13px 14px;line-height:1.58;font-size:16px;
  display:flex;gap:10px;align-items:flex-start;
}
.opt .letter{font-weight:800;color:var(--accent);min-width:22px}
.opt.selected{border-color:var(--accent);background:#fff1e9}
.opt.correct{border-color:var(--ok);background:#eef9f2}
.opt.wrong{border-color:var(--bad);background:#fff0ed}
.multiActions{display:none;gap:10px;margin-top:14px}
.multiActions.show{display:flex}
.primary{background:var(--accent);color:white;border-color:var(--accent)}
.feedback{display:none;margin-top:16px;padding:14px;border-radius:16px;line-height:1.65;white-space:pre-wrap}
.feedback.good{display:block;background:#eef9f2;border:1px solid #abd8bb;color:#124b2b}
.feedback.bad{display:block;background:#fff0ed;border:1px solid #f0b6ac;color:#5f130e}
.bottomNav{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:flex;justify-content:space-between;gap:10px;
  padding:12px 14px max(12px,env(safe-area-inset-bottom));
  background:linear-gradient(transparent,rgba(247,241,232,.96));
}
.bottomNav button{flex:1;max-width:180px;border-color:rgba(159,45,45,.25);background:rgba(255,250,242,.96);color:var(--accent);font-weight:700;box-shadow:0 6px 18px rgba(70,45,20,.12)}
.drawer{
  position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.25);
  display:none;align-items:flex-end;
}
.drawer.open{display:flex}
.drawerPanel{
  width:100%;max-width:920px;margin:0 auto;background:var(--bg);
  border-radius:22px 22px 0 0;padding:18px 16px max(18px,env(safe-area-inset-bottom));
  box-shadow:0 -10px 30px rgba(0,0,0,.18);
}
.drawerHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:20px}
.label{display:block;color:var(--muted);font-size:13px;margin:12px 0 6px}
#mode{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.jumpRow{display:flex;gap:10px}
.jumpRow input{flex:1;min-width:0}
.jumpRow button{width:100px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.stats div{background:#fffaf2;border:1px solid var(--line);border-radius:16px;padding:10px 6px;text-align:center}
.stats b{display:block;font-size:19px;color:var(--accent)}
.stats span{font-size:12px;color:var(--muted)}
.danger{width:100%;background:#fff0ed;color:var(--bad);border-color:#f0b6ac}
.hint{font-size:12px;color:var(--muted);line-height:1.5;margin:10px 0 0}
.empty{color:var(--muted);font-size:16px;line-height:1.7}
@media(max-width:560px){
  .app{padding:12px 12px 84px}
  h1{font-size:20px}
  .card{padding:15px;border-radius:20px;min-height:calc(100vh - 178px)}
  #question{font-size:18px}
  .opt{font-size:16px;padding:12px}
  .bottomNav button{font-size:15px;padding:11px 8px}
}

</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>习概客观题刷题卡</h1>
        <p id="subtitle">加载题库中……</p>
      </div>
      <button id="menuBtn" class="iconbtn" aria-label="菜单">☰</button>
    </header>

    <main class="stage" id="stage">
      <section class="card" id="card">
        <div class="meta">
          <span id="typeTag">题型</span>
          <span id="counter">0 / 0</span>
        </div>
        <div class="progress"><div id="bar"></div></div>
        <h2 id="question">正在载入题目……</h2>
        <div id="options" class="options"></div>
        <div id="multiActions" class="multiActions">
          <button id="submitBtn" class="primary">提交答案</button>
          <button id="clearPickBtn">清空选择</button>
        </div>
        <div id="feedback" class="feedback"></div>
      </section>
    </main>

    <nav class="bottomNav">
      <button id="prevBtn">← 上一题</button>
      <button id="wrongBtn">错题本</button>
      <button id="nextBtn">下一题 →</button>
    </nav>
  </div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawerPanel">
      <div class="drawerHead">
        <strong>练习设置</strong>
        <button id="closeDrawer" class="iconbtn">×</button>
      </div>

      <label class="label">题型筛选</label>
      <select id="mode">
        <option value="all">全部题型</option>
        <option value="single">只练单选</option>
        <option value="multi">只练多选</option>
        <option value="judge">只练判断</option>
        <option value="wrong">只看错题</option>
        <option value="fav">只看收藏</option>
      </select>

      <div class="grid2">
        <button id="shuffleBtn">随机顺序</button>
        <button id="orderBtn">恢复顺序</button>
        <button id="favBtn">收藏本题</button>
        <button id="showAnswerBtn">看答案</button>
      </div>

      <div class="jumpBox">
        <label class="label">跳转到当前列表第几题</label>
        <div class="jumpRow">
          <input id="jumpInput" type="number" min="1" value="1">
          <button id="jumpBtn">跳转</button>
        </div>
      </div>

      <div class="stats">
        <div><b id="statDone">0</b><span>已作答</span></div>
        <div><b id="statRight">0</b><span>正确</span></div>
        <div><b id="statWrong">0</b><span>错误</span></div>
        <div><b id="statRate">0%</b><span>正确率</span></div>
      </div>

      <button id="resetBtn" class="danger">清空进度/错题</button>
      <p class="hint">部署到 Netlify 后可在 Safari / 微信 / 浏览器中使用，进度、错题、收藏会保存在当前浏览器。</p>
    </div>
  </aside>

  <script>
window.QUESTION_BANK = [{"id": 1, "num": "1", "section": "single", "type": "单选", "question": "习近平总结党百年来的理论创新经验，在强调坚持“第一个结合”的基础上，明确提出把马克思主义基本原理同（　）相结合的重大命题，这是又一次思想解放。", "options": {"A": "人类一切文明成果", "B": "中华优秀传统文化", "C": "中国具体实际", "D": "中国传统文化"}, "answer": "B", "explanation": "解析：教材导论明确指出，习近平在强调坚持马克思主义基本原理同中国具体实际相结合，即“第一个结合”的基础上，进一步提出把马克思主义基本原理同中华优秀传统文化相结合，这是“又一次思想解放”。因此，题目所问的是“第二个结合”，应选中华优秀传统文化。"}, {"id": 2, "num": "2", "section": "single", "type": "单选", "question": "党的领导是整体的。党要完整发挥领导功能，无论是党的中央组织还是地方组织、基层组织，都要按照（　）的规定发挥各自作用。", "options": {"A": "党纲", "B": "党章", "C": "党纪", "D": "宪法"}, "answer": "B", "explanation": "解析：教材第三章指出，党的领导是整体的，无论是党的中央组织还是地方组织、基层组织，都要按照党章的规定发挥各自作用。党章是党的根本大法，对各级党组织的职责和作用作出根本规定。"}, {"id": 3, "num": "3", "section": "single", "type": "单选", "question": "（　）是中国特色社会主义法治体系的根本制度基础，是全面推进依法治国的根本制度保障。", "options": {"A": "马克思主义指导", "B": "党的领导制度", "C": "依法治国和以德治国相结合", "D": "中国特色社会主义制度"}, "answer": "D", "explanation": "解析：教材第九章指出，中国特色社会主义制度是中国特色社会主义法治体系的根本制度基础，是全面推进依法治国的根本制度保障。马克思主义是指导思想，依法治国和以德治国相结合是重要原则，均不属于题干所问的根本制度基础。"}, {"id": 4, "num": "4", "section": "single", "type": "单选", "question": "全面贯彻新时代党解决台湾问题的总体方略，必须（　），这是实现祖国统一的战略支撑。", "options": {"A": "坚持决不承诺放弃使用武力", "B": "坚持党中央对对台工作的集中统一领导", "C": "坚持团结台湾同胞、争取台湾民心", "D": "坚持反对外部势力干涉"}, "answer": "B", "explanation": "解析：教材明确指出，坚持党中央对对台工作的集中统一领导，是实现祖国统一的战略支撑。团结台湾同胞、争取台湾民心以及反对外部势力干涉也都是重要要求，但与“战略支撑”这一特定表述不对应。"}, {"id": 5, "num": "5", "section": "single", "type": "单选", "question": "政治立场是一个政党观察、认识、处理政治问题的立足点，反映了这个政党的世界观、方法论和执政理念，体现了这个政党的根本属性。（　）是中国共产党的根本政治立场，是我们党区别于其他政党的显著标志。", "options": {"A": "阶级立场", "B": "自我革命", "C": "人民立场", "D": "实事求是"}, "answer": "C", "explanation": "解析：教材第六章指出，人民立场是中国共产党的根本政治立场，是我们党区别于其他政党的显著标志。自我革命是跳出治乱兴衰历史周期率的第二个答案，实事求是是党的思想路线的重要内容。"}, {"id": 6, "num": "6", "section": "single", "type": "单选", "question": "要培育和践行社会主义核心价值观，弘扬以（　）为源头的中国共产党人精神谱系，提高全社会文明程度，推动社会主义核心价值观融入经济社会发展和人们生产生活方方面面，更好构筑中国精神、中国价值、中国力量。", "options": {"A": "井冈山精神", "B": "遵义会议精神", "C": "伟大建党精神", "D": "长征精神"}, "answer": "C", "explanation": "解析：教材第十一章指出，要弘扬以伟大建党精神为源头的中国共产党人精神谱系。井冈山精神、遵义会议精神和长征精神都是这一精神谱系的重要组成部分，但不是整个精神谱系的源头。"}, {"id": 7, "num": "7", "section": "single", "type": "单选", "question": "全面依法治国涉及很多方面，在实际工作中必须有一个总揽全局、牵引各方的总抓手，这个总抓手就是（　）。依法治国各项工作都要围绕这个总抓手来谋划。", "options": {"A": "建设中国特色社会主义法治体系，建设社会主义法治国家", "B": "建设社会主义法治国家", "C": "建设中国特色社会主义法治体系", "D": "坚持中国共产党的领导"}, "answer": "C", "explanation": "解析：教材第九章指出，建设中国特色社会主义法治体系是全面依法治国的总抓手。建设中国特色社会主义法治体系、建设社会主义法治国家是全面依法治国的总目标，二者不能混淆。"}, {"id": 8, "num": "8", "section": "single", "type": "单选", "question": "恩格斯指出，“工人阶级一旦取得统治权，就不能继续运用旧的国家机器来进行管理”，必须“以新的真正民主的国家政权来代替”。人民在一个国家的地位是由这个国家的（　）决定的。", "options": {"A": "经济实力", "B": "社会发展程度", "C": "人口数量", "D": "政权性质"}, "answer": "D", "explanation": "解析：教材指出，人民在一个国家中的地位由这个国家的政权性质决定。社会主义国家的政权性质决定了人民是国家的主人，经济实力、社会发展程度和人口数量都不能从根本上决定人民的政治地位。"}, {"id": 9, "num": "9", "section": "single", "type": "单选", "question": "我国国家制度和国家治理体系具有多方面的显著优势，其中最大优势是（　）。这一优势是带有统领性的根本优势，贯穿于中国特色社会主义制度和国家治理体系其他方面显著优势中。", "options": {"A": "中国式现代化", "B": "人民民主专政", "C": "中国共产党领导", "D": "人民当家作主"}, "answer": "C", "explanation": "解析：教材第三章明确指出，中国共产党领导是我国国家制度和国家治理体系的最大优势，是带有统领性的根本优势，并贯穿于其他方面显著优势之中。"}, {"id": 10, "num": "10", "section": "single", "type": "单选", "question": "面对党面临的重大风险考验和党内存在的突出问题，以习近平同志为核心的党中央坚定不移坚持和加强党的全面领导，坚定不移推进全面从严治党，深入推进新时代党的建设新的伟大工程，找到了（　）这个跳出治乱兴衰历史周期率的第二个答案。", "options": {"A": "人民民主", "B": "群众路线", "C": "自我革命", "D": "党的领导"}, "answer": "C", "explanation": "解析：教材明确指出，党找到了自我革命这个跳出治乱兴衰历史周期率的第二个答案。人民民主是党跳出历史周期率的第一个答案。"}, {"id": 11, "num": "11", "section": "single", "type": "单选", "question": "中国始终高举和平、发展、合作、共赢旗帜，在快速变革的世界中牢牢把握大变局的发展方向。提出构建人类命运共同体重大理念，提出共建“一带一路”倡议，提出全球发展倡议、全球安全倡议、全球文明倡议，深刻回答（　）的时代课题。", "options": {"A": "“百年未有之大变局中人类向何处去”", "B": "“世界怎么了、我们怎么办”", "C": "“如何共建人类家园”", "D": "“什么是人类命运共同体、如何构建人类命运共同体”"}, "answer": "B", "explanation": "解析：教材第十六章指出，构建人类命运共同体、共建“一带一路”以及全球发展倡议、全球安全倡议、全球文明倡议，深刻回答了“世界怎么了、我们怎么办”的时代课题。"}, {"id": 12, "num": "12", "section": "single", "type": "单选", "question": "马克思主义认为，在资本主义社会，生产表现为人的目的，而人并不是生产的目的。社会主义生产的根本目的是（　）。", "options": {"A": "解放和发展生产力", "B": "提高经济水平", "C": "推进社会治理现代化", "D": "增进民生福祉"}, "answer": "D", "explanation": "解析：教材关于保障和改善民生的内容指出，增进民生福祉是社会主义生产的根本目的。解放和发展生产力是社会主义的重要任务，但其最终落脚点仍是满足人民需要、改善人民生活。"}, {"id": 13, "num": "13", "section": "single", "type": "单选", "question": "（　）是我们党百年奋斗的宝贵历史经验，也是新时代党治国理政的根本价值取向。", "options": {"A": "坚持和加强党的全面领导", "B": "坚持人民至上", "C": "坚持发扬斗争精神", "D": "坚持深化改革开放"}, "answer": "B", "explanation": "解析：教材第六章指出，坚持人民至上是我们党百年奋斗的宝贵历史经验，也是新时代党治国理政的根本价值取向。它要求始终把人民放在心中最高位置，把人民对美好生活的向往作为奋斗目标。"}, {"id": 14, "num": "14", "section": "single", "type": "单选", "question": "构建新安全格局是应对国家安全形势新变化新趋势的战略选择，是全面贯彻落实总体国家安全观的重大举措。构建统筹各领域安全的新安全格局，必须把（　）作为应对各领域安全风险挑战的首要任务。", "options": {"A": "牢牢守住安全发展这条底线", "B": "维护政治安全", "C": "维护经济安全", "D": "维护重点领域国家安全"}, "answer": "B", "explanation": "解析：教材第十五章指出，构建统筹各领域安全的新安全格局，必须把维护政治安全作为应对各领域安全风险挑战的首要任务。政治安全是国家安全的根本，具有统领性地位。"}, {"id": 15, "num": "15", "section": "single", "type": "单选", "question": "坚定不移贯彻创新、协调、绿色、开放、共享的新发展理念，引领我国发展全局发生历史性变革。其中，开放发展注重的是解决（　）。", "options": {"A": "发展不平衡问题", "B": "发展内外联动问题", "C": "社会公平正义问题", "D": "发展动力问题"}, "answer": "B", "explanation": "解析：教材关于新发展理念的内容指出，创新发展注重解决发展动力问题，协调发展注重解决发展不平衡问题，开放发展注重解决发展内外联动问题，共享发展注重解决社会公平正义问题。"}, {"id": 16, "num": "16", "section": "single", "type": "单选", "question": "（　）源远流长、博大精深，是中华文明的智慧结晶，同马克思主义具有高度契合性。", "options": {"A": "中华优秀传统文化", "B": "中华传统文化", "C": "中华民族现代文明", "D": "中国特色社会主义"}, "answer": "A", "explanation": "解析：教材导论指出，中华优秀传统文化源远流长、博大精深，是中华文明的智慧结晶，同马克思主义具有高度契合性。“中华传统文化”范围过宽，题干对应的是规范表述“中华优秀传统文化”。"}, {"id": 17, "num": "17", "section": "single", "type": "单选", "question": "教育是国之大计、党之大计。实施科教兴国战略，建设教育强国，必须回答的教育的根本问题是（　）。", "options": {"A": "培养什么人、怎样培养人、为谁培养人", "B": "什么是社会主义、怎样建设社会主义", "C": "怎样培养德智体美劳全面发展的社会主义建设者和接班人", "D": "建设什么样的社会主义现代化强国、怎样建设社会主义现代化强国"}, "answer": "A", "explanation": "解析：教材第七章指出，培养什么人、怎样培养人、为谁培养人，是教育的根本问题，也是建设教育强国的核心课题。立德树人就是要从根本上回答好这一问题。"}, {"id": 18, "num": "18", "section": "single", "type": "单选", "question": "保障和改善民生没有终点，只有连续不断的新起点。（　）是最基本的民生，是劳动者赖以生存和发展的基础、共享经济发展成果的基本条件，关系到亿万劳动者及其家庭的切身利益。", "options": {"A": "教育", "B": "医疗", "C": "就业", "D": "分配"}, "answer": "C", "explanation": "解析：教材关于保障和改善民生的内容指出，就业是最基本的民生，是劳动者赖以生存和发展的基础，也是共享经济发展成果的基本条件。"}, {"id": 19, "num": "19", "section": "single", "type": "单选", "question": "党的二十大进一步明确，全面建成社会主义现代化强国总的战略安排是分两步走。第一步，到2035年我国将（　）。", "options": {"A": "实现中华民族伟大复兴的中国梦", "B": "把我国建设成为富强美丽文明和谐的社会现代化强国", "C": "基本实现社会主义现代化", "D": "全面建成小康社会"}, "answer": "C", "explanation": "解析：教材第二章指出，全面建成社会主义现代化强国分两步走：第一步，从2020年到2035年基本实现社会主义现代化；第二步，从2035年到本世纪中叶把我国建成社会主义现代化强国。"}, {"id": 20, "num": "20", "section": "single", "type": "单选", "question": "党在新时代的强军目标，是深刻总结我们党建军治军的成功经验，适应国际战略形势和国家安全环境发展的重大变化，着眼于解决军队建设所面临的突出矛盾和问题作出的战略决策。（　），是决定军队建设的政治方向。", "options": {"A": "听党指挥是灵魂", "B": "作风优良是保证", "C": "军民融合是关键", "D": "能打胜仗是核心"}, "answer": "A", "explanation": "解析：教材第十四章指出，听党指挥是灵魂，决定军队建设的政治方向；能打胜仗是核心，反映军队的根本职能和建设指向；作风优良是保证。"}, {"id": 21, "num": "21", "section": "single", "type": "单选", "question": "党政军民学，东西南北中，（　）是领导一切的，是最高的政治领导力量。", "options": {"A": "军队", "B": "党", "C": "政府", "D": "人民"}, "answer": "B", "explanation": "解析：教材第三章指出，党政军民学，东西南北中，党是领导一切的。中国共产党是最高政治领导力量，党的领导是中国特色社会主义最本质的特征和中国特色社会主义制度的最大优势。"}, {"id": 22, "num": "22", "section": "single", "type": "单选", "question": "我国社会主要矛盾的变化反映了我国社会主义（　）不断变化的新特点，是我们党作出中国特色社会主义进入新时代重大判断的基本依据。", "options": {"A": "初级阶段", "B": "高级阶段", "C": "中等阶段", "D": "最终阶段"}, "answer": "A", "explanation": "解析：教材指出，我国社会主要矛盾的变化反映了社会主义初级阶段不断变化的新特点，但没有改变我国仍处于并将长期处于社会主义初级阶段的基本国情。"}, {"id": 23, "num": "23", "section": "single", "type": "单选", "question": "政治立场是一个政党观察、认识、处理政治问题的立足点，反映了这个政党的世界观、方法论和执政理念，体现了这个政党的根本属性。我们党的最大政治优势是密切联系群众，党执政后的最大危险是（　）。", "options": {"A": "改革出问题", "B": "消极腐败", "C": "脱离群众", "D": "没有坚持公有制的主体地位"}, "answer": "C", "explanation": "解析：教材第六章指出，我们党的最大政治优势是密切联系群众，党执政后的最大危险是脱离群众。消极腐败是党长期执政面临的重大威胁，但不对应题干中的规范表述。"}, {"id": 24, "num": "24", "section": "single", "type": "单选", "question": "党的政治建设是党的根本性建设，把政治建设纳入党的建设总体布局并摆在首位，是新时代我们党对马克思主义党建理论的重大创新。（　）是党的政治建设的首要任务。", "options": {"A": "保证全党服从中央，坚持党中央权威和集中统一领导", "B": "营造良好政治生态，保证全党的高度团结统一", "C": "把握党的政治方向、政治立场、政治大局", "D": "坚定马克思主义立场，坚决站稳党性立场和人民立场"}, "answer": "A", "explanation": "解析：教材指出，保证全党服从中央，坚持党中央权威和集中统一领导，是党的政治建设的首要任务。其他选项也是党的政治建设的重要内容，但不属于“首要任务”的规范表述。"}, {"id": 25, "num": "25", "section": "single", "type": "单选", "question": "全面深化改革开放改什么、怎么改，这是一个带有根本性的问题。改革开放的鲜明特征和首要任务是（　）。", "options": {"A": "解放和增强社会活力", "B": "以创新的思维和办法解决前进中的问题", "C": "解放思想实事求是", "D": "解放和发展社会生产力"}, "answer": "D", "explanation": "解析：教材第五章指出，解放思想是全面深化改革开放的思想前提，解放和发展社会生产力是改革开放的鲜明特征和首要任务，解放和增强社会活力是社会主义改革的内在要求和基本目的。"}, {"id": 26, "num": "26", "section": "single", "type": "单选", "question": "人才培养是育人和育才相统一的过程，教育传授给学生的不仅是知识，更重要的是价值观塑造、能力锻造、人格养成。教育无论发展到什么程度，第一位的是（　），引导学生树立正确的世界观、人生观、价值观，全面发展、学有所长，培养出党和国家需要、对社会有用的人。", "options": {"A": "原始创新", "B": "立德树人", "C": "为党育人", "D": "教师队伍建设"}, "answer": "B", "explanation": "解析：教材第七章指出，教育无论发展到什么程度，第一位的是立德树人。教育不仅要传授知识，还要塑造价值观、锻造能力、养成人格，培养德智体美劳全面发展的社会主义建设者和接班人。"}, {"id": 27, "num": "27", "section": "single", "type": "单选", "question": "（　）是中华文明的智慧结晶和精华所在，是中华民族的根和魂，是我们在世界文化激荡中站稳脚跟的根基。", "options": {"A": "中国特色社会主义文化", "B": "中华优秀传统文化", "C": "革命文化", "D": "社会主义先进文化"}, "answer": "B", "explanation": "解析：教材指出，中华优秀传统文化是中华文明的智慧结晶和精华所在，是中华民族的根和魂，也是我们在世界文化激荡中站稳脚跟的根基。"}, {"id": 28, "num": "28", "section": "single", "type": "单选", "question": "党的二十大进一步明确，全面建成社会主义现代化强国总的战略安排是分两步走。第一步，到2035年我国将（　）。", "options": {"A": "全面建成小康社会", "B": "实现中华民族伟大复兴的中国梦", "C": "把我国建设成为富强美丽文明和谐的社会主义现代化强国", "D": "基本实现社会主义现代化"}, "answer": "D", "explanation": "解析：教材第二章指出，全面建成社会主义现代化强国分两步走。第一步，从2020年到2035年基本实现社会主义现代化；第二步，从2035年到本世纪中叶把我国建成社会主义现代化强国。"}, {"id": 29, "num": "29", "section": "single", "type": "单选", "question": "（　）规定了我国经济关系的基本原则，明确人们在生产、分配、交换、消费中的地位及相互关系，是解放和发展社会生产力、改善人民生活、维护社会公平正义、推进共同富裕的制度基础，对实现高质量发展具有重大意义。", "options": {"A": "社会主义基本经济制度", "B": "公有制为主体、多种所有制经济共同发展", "C": "按劳分配为主体、多种分配方式并存", "D": "新发展理念"}, "answer": "A", "explanation": "解析：教材第六章指出，社会主义基本经济制度规定了我国经济关系的基本原则，是解放和发展社会生产力、改善人民生活、维护社会公平正义、推进共同富裕的制度基础。B、C只是社会主义基本经济制度的组成部分。"}, {"id": 30, "num": "30", "section": "single", "type": "单选", "question": "评判一种民主形式好不好，实践最有说服力，（　）最有发言权。", "options": {"A": "新闻媒体", "B": "中国共产党", "C": "人民政府", "D": "人民"}, "answer": "D", "explanation": "解析：教材第八章指出，评判一种民主形式好不好，实践最有说服力，人民最有发言权。人民是民主实践的主体，也是民主成效的最终评判者。"}, {"id": 31, "num": "31", "section": "single", "type": "单选", "question": "人民民主是社会主义的生命，（　）是社会主义民主政治的本质属性，是植根于我国社会主义民主的长期实践，中国特色社会主义民主政治理论和实践的重大成果。", "options": {"A": "全面从严治党", "B": "全过程人民民主", "C": "全面依法治国", "D": "人民当家作主"}, "answer": "B", "explanation": "解析：教材第八章指出，全过程人民民主是社会主义民主政治的本质属性，植根于我国社会主义民主的长期实践，是新时代我国民主政治领域具有重大创新意义的标志性成果。"}, {"id": 32, "num": "32", "section": "single", "type": "单选", "question": "统筹发展和安全，是党和国家的一项基础性工作。发展和安全是两件大事。下列关于这两件大事的说法中错误的是（　）。", "options": {"A": "发展解决的是动力问题，是推动国家和民族赓续绵延的根本支撑", "B": "发展是解决安全问题的总钥匙，发展就是最大的安全", "C": "安全具有基础性、根本性，没有国家安全发展只能是“镜花水月”", "D": "安全解决的是保障问题，是确保国家和民族行稳致远的坚强柱石"}, "answer": "B", "explanation": "解析：教材第十五章指出，发展解决动力问题，安全解决保障问题；发展是安全的基础，安全是发展的条件，二者必须同步推进。把发展简单等同于安全，不符合教材关于发展和安全辩证关系的规范表述。"}, {"id": 33, "num": "33", "section": "single", "type": "单选", "question": "政治立场是一个政党观察、认识、处理政治问题的立足点，反映了这个政党的世界观、方法论和执政理念，体现了这个政党的根本属性。我们党的最大政治优势是（　）。", "options": {"A": "全过程人民民主", "B": "密切联系群众", "C": "勇于自我革命", "D": "人民当家作主"}, "answer": "B", "explanation": "解析：教材第六章指出，我们党的最大政治优势是密切联系群众，党执政后的最大危险是脱离群众。"}, {"id": 34, "num": "34", "section": "single", "type": "单选", "question": "（　）是中国特色社会主义法治体系的理论指导和学理支撑，是全面推进依法治国的行动指南。", "options": {"A": "党的领导", "B": "中国特色社会主义法治理论", "C": "马克思主义理论", "D": "科学社会主义"}, "answer": "B", "explanation": "解析：教材第九章指出，中国特色社会主义法治理论是中国特色社会主义法治体系的理论指导和学理支撑，是全面推进依法治国的行动指南。党的领导是全面依法治国的根本保证，但不对应题干所问的理论指导。"}, {"id": 35, "num": "35", "section": "single", "type": "单选", "question": "（　）让中国特色社会主义道路有了更加宏阔深远的历史纵深，拓展了中国特色社会主义道路的文化根基，开辟了广阔的理论和实践创新空间，表明我们党对中国道路、理论、制度的认识达到了新高度，表明我们党的历史自信、文化自信达到了新高度，表明我们党在传承中华优秀传统文化中推进理论创新的自觉性达到了新高度。", "options": {"A": "“三个务必”", "B": "“两个确立”", "C": "“两个结合”", "D": "“十个明确”"}, "answer": "C", "explanation": "解析：“两个结合”是指把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合。“第二个结合”拓展了中国特色社会主义道路的文化根基和历史纵深，开辟了理论创新和实践创新的新空间，因此应选“两个结合”。"}, {"id": 36, "num": "36", "section": "single", "type": "单选", "question": "建设教育强国是全面建成社会主义现代化强国的战略先导，必须把教育事业放在优先发展的战略位置，把（　）作为教育的根本任务。", "options": {"A": "为党育人、为国育才", "B": "立德树人", "C": "服务中华民族伟大复兴", "D": "支撑引领中国式现代化"}, "answer": "B", "explanation": "解析：教材指出，建设教育强国必须落实立德树人根本任务。教育无论发展到什么程度，第一位的都是立德树人。“培养什么人、怎样培养人、为谁培养人”是教育的根本问题，而立德树人是教育的根本任务。"}, {"id": 37, "num": "37", "section": "single", "type": "单选", "question": "（　）是中华民族伟大复兴的根本保证。", "options": {"A": "中国式现代化", "B": "中国共产党领导", "C": "人民当家作主", "D": "全面深化改革"}, "answer": "B", "explanation": "解析：中国共产党领导是中国特色社会主义最本质的特征，也是中国特色社会主义制度的最大优势。历史和现实证明，中国共产党的坚强领导是推进强国建设、实现中华民族伟大复兴的根本保证。"}, {"id": 38, "num": "38", "section": "single", "type": "单选", "question": "中国特色大国外交，坚持以（　）为底线维护国家主权、安全、发展利益，坚决遏制和打击一切形式的分裂行径，积极保障经济金融安全，有效维护海外利益，有效防范和化解各种风险挑战，为改革发展和民族复兴保驾护航。", "options": {"A": "国家核心利益", "B": "维护世界和平、促进共同发展", "C": "深化外交布局", "D": "构建人类命运共同体"}, "answer": "A", "explanation": "解析：中国特色大国外交坚持以国家核心利益为底线，坚定维护国家主权、安全、发展利益。维护世界和平、促进共同发展是外交宗旨，构建人类命运共同体是重要理念和目标，均不对应题干中的“底线”。"}, {"id": 39, "num": "39", "section": "single", "type": "单选", "question": "（　）是一个民族赖以维系的精神纽带，是一个国家共同的思想道德基础。否则，一个民族、一个国家就会魂无定所、行无依归。", "options": {"A": "意识形态", "B": "文化遗产", "C": "核心价值观", "D": "理想信念"}, "answer": "C", "explanation": "解析：核心价值观承载着一个民族、一个国家的精神追求，是一个民族赖以维系的精神纽带，也是一个国家共同的思想道德基础。题干对应的是教材关于核心价值观作用的规范表述。"}, {"id": 40, "num": "40", "section": "single", "type": "单选", "question": "坚定道路自信，就是坚信（　）道路是我国实现社会主义现代化、创造人民美好生活的必由之路，是实现中华民族伟大复兴的必由之路。", "options": {"A": "全面深化改革开放", "B": "中国特色社会主义", "C": "中国式现代化", "D": "全面从严治党"}, "answer": "B", "explanation": "解析：坚定道路自信，就是坚信中国特色社会主义道路是实现社会主义现代化、创造人民美好生活的必由之路，也是实现中华民族伟大复兴的必由之路。"}, {"id": 41, "num": "41", "section": "single", "type": "单选", "question": "党在新时代的强军目标，谋的是民族复兴伟业，布的是强国强军大局，立的是发展安全之基，理论意蕴深邃，实践意义重大。在长期实践中，人民军队形成了一整套（　），这是人民军队的鲜明特色和政治优势，也是人民军队战无不胜、攻无不克的重要保证。", "options": {"A": "能打仗和打胜仗能力", "B": "政治制度和领导制度", "C": "党的领导制度和体系", "D": "光荣传统和优良作风"}, "answer": "D", "explanation": "解析：在长期革命、建设和改革实践中，人民军队形成了一整套光荣传统和优良作风，这是人民军队的鲜明特色和政治优势，也是人民军队战无不胜、攻无不克的重要保证。"}, {"id": 42, "num": "42", "section": "single", "type": "单选", "question": "习近平指出，我们既要绿水青山，也要金山银山。宁要绿水青山，不要金山银山，而且绿水青山就是金山银山。这一论述阐述了（　）和生态环境保护的关系。", "options": {"A": "文化发展", "B": "人口发展", "C": "经济发展", "D": "社会发展"}, "answer": "C", "explanation": "解析：“绿水青山就是金山银山”阐述了经济发展和生态环境保护之间的辩证统一关系，揭示了保护生态环境就是保护生产力、改善生态环境就是发展生产力。"}, {"id": 43, "num": "43", "section": "single", "type": "单选", "question": "马克思主义认为，在资本主义社会，生产表现为人的目的，而人并不是生产的目的。关注人本身的发展，是社会主义和资本主义的根本区别之一。社会主义生产的根本目的最接近于（　）。", "options": {"A": "提高经济水平", "B": "增进民生福祉", "C": "解放生产力", "D": "推进社会治理现代化"}, "answer": "B", "explanation": "解析：教材指出，社会主义生产的根本目的是增进民生福祉，促进人的全面发展。解放生产力是社会主义的重要任务，但最终仍要落脚到改善人民生活、增进人民福祉；提高经济水平和推进社会治理现代化也都不是题干所问的根本目的。"}, {"id": 44, "num": "44", "section": "single", "type": "单选", "question": "坚持制度治党、依规治党，要坚持以党章为根本，以（　）为核心，以党的建设新形势新任务新要求为牵引，与时俱进制定和修订党内法规制度，及时将行之有效的措施制度化法规化，进一步完善党内法规制度体系。", "options": {"A": "民主多元制", "B": "集中统一制", "C": "民主集中制", "D": "集体领导制"}, "answer": "C", "explanation": "解析：教材指出，坚持制度治党、依规治党，要坚持以党章为根本、以民主集中制为核心，根据党的建设新形势新任务新要求，与时俱进制定和修订党内法规制度，及时将行之有效的措施制度化、法规化，进一步完善党内法规制度体系。民主集中制是党的根本组织原则和领导制度，其他选项均不符合教材规范表述。"}, {"id": 45, "num": "45", "section": "single", "type": "单选", "question": "如期实现建军一百年奋斗目标，加快把人民军队建成世界一流军队，是全面建设社会主义现代化国家的战略要求。开创国防和军队现代化新局面，下列表述错误的是（　）。", "options": {"A": "牢固确立政治工作这个唯一的根本的标准，坚决破除“和平积弊”", "B": "党在新时代的强军目标是建设一支听党指挥、能打胜仗、作风优良的人民军队，把人民军队建设成为世界一流军队", "C": "巩固国防和强大人民军队是新时代坚持和发展中国特色社会主义、实现中华民族伟大复兴的战略支撑", "D": "党对军队的绝对领导是人民军队的建军之本、强军之魂"}, "answer": "A", "explanation": "解析：军队建设必须牢固确立战斗力这个唯一的根本标准，而不是把政治工作表述为唯一的根本标准。政治工作是人民军队的生命线。其余三项分别符合新时代强军目标、巩固国防和强军的战略支撑地位以及党对军队绝对领导的规范表述，因此A错误。"}, {"id": 46, "num": "46", "section": "single", "type": "单选", "question": "总体国家安全观是新时代国家安全工作的基本遵循，必须坚持总体国家安全观，走出一条中国特色国家安全道路。总体国家安全观的根本是（　）。", "options": {"A": "经济安全", "B": "人民安全", "C": "政治安全", "D": "国家利益至上"}, "answer": "C", "explanation": "解析：总体国家安全观以人民安全为宗旨，以政治安全为根本，以经济安全为基础，以军事、科技、文化、社会安全为保障，以促进国际安全为依托。因此题干所问的“根本”是政治安全。"}, {"id": 47, "num": "47", "section": "single", "type": "单选", "question": "（　）是以联合国宪章为基础和行为准绳的，其理论基础是共识性的、不是独断性的，实践基础是包容性的、不是排他性的，反映了世界各国人民普遍认同的价值理念的最大公约数，从根本上符合世界各国人民携手共建人类命运共同体、共创人类更加美好未来的前进方向。", "options": {"A": "全人类共同价值", "B": "自由民主价值", "C": "普世价值", "D": "世界一体化建设"}, "answer": "A", "explanation": "解析：全人类共同价值以联合国宪章为基础和行为准绳，其理论基础具有共识性，实践基础具有包容性，反映世界各国人民普遍认同的价值理念的最大公约数。它不同于少数国家将自身价值观包装成的所谓“普世价值”，因此应选A。"}, {"id": 48, "num": "48", "section": "single", "type": "单选", "question": "党的十八大后，党面临的主要任务是，实现第一个百年奋斗目标，开启实现第二个百年奋斗目标新征程，朝着实现（　）的宏伟目标继续前进。", "options": {"A": "构建人类命运共同体", "B": "中华民族伟大复兴", "C": "中国式现代化", "D": "建设美丽中国"}, "answer": "B", "explanation": "解析：党的十八大后，党面临的主要任务是实现第一个百年奋斗目标，开启第二个百年奋斗目标新征程，朝着实现中华民族伟大复兴的宏伟目标继续前进。中国式现代化是强国建设、民族复兴的实践路径，不是题干所问的宏伟目标。"}, {"id": 49, "num": "49", "section": "single", "type": "单选", "question": "（　）中华民族伟大复兴的根本保证。", "options": {"A": "人民当家作主", "B": "全面深化改革", "C": "中国式现代化", "D": "中国共产党领导"}, "answer": "D", "explanation": "解析：中国共产党领导是中国特色社会主义最本质的特征，是中国特色社会主义制度的最大优势，也是实现中华民族伟大复兴的根本保证。题干虽省略了“是”字，但不影响考点判断。"}, {"id": 50, "num": "50", "section": "single", "type": "单选", "question": "党的十八大以来，我们党适应发展新的形势，对发展理念和思路作出及时调整，提出了经济社会发展的许多重大理论和战略，其中（　）是最重要、最主要的。", "options": {"A": "发展新质生产力", "B": "新发展理念", "C": "供给侧结构性改革", "D": "以人民为中心的发展思想"}, "answer": "B", "explanation": "解析：党的十八大以来，我们党根据发展阶段、环境和条件的新变化，提出了许多重大理论和战略，其中新发展理念是最重要、最主要的。创新、协调、绿色、开放、共享相互贯通，集中体现了我国的发展思路、发展方向和发展着力点。"}, {"id": 51, "num": "51", "section": "single", "type": "单选", "question": "建设教育强国是全面建成社会主义现代化强国的战略先导，是实现高水平科技自立自强的重要支撑，是促进全体人民共同富裕的有效途径，是以中国式现代化全面推进中华民族伟大复兴的基础工程。（　）是发展教育的根本尺度。", "options": {"A": "立德树人", "B": "高质量发展", "C": "教育公平", "D": "人民满意"}, "answer": "D", "explanation": "解析：人民满意是发展教育的根本尺度。需要区分：立德树人是教育的根本任务，“培养什么人、怎样培养人、为谁培养人”是教育的根本问题，人民满意才是发展教育的根本尺度，因此应选D。"}, {"id": 52, "num": "52", "section": "single", "type": "单选", "question": "党的基本理论、基本路线、基本方略，事关党的前途命运，事关中国特色社会主义事业兴衰成败。（　）是坚持和发展中国特色社会主义的行动指南。", "options": {"A": "党的基本方略", "B": "党的基本理论", "C": "党的基本政策", "D": "党的基本路线"}, "answer": "B", "explanation": "解析：教材明确，党的基本理论是坚持和发展中国特色社会主义的行动指南。党的基本路线是党和国家的生命线、人民的幸福线；党的基本方略是新时代坚持和发展中国特色社会主义的行动纲领，三者定位不同，因此选B。"}, {"id": 53, "num": "53", "section": "single", "type": "单选", "question": "（　）是以联合国宪章为基础和行为准绳的，其理论基础是共识性的、不是独断性的，实践基础是包容性的、不是排他性的，反映了世界各国人民普遍认同的价值理念的最大公约数，从根本上符合世界人民携手共建人类命运共同体、共创人类更加美好未来的前进方向。", "options": {"A": "普世价值", "B": "世界一体化建设", "C": "全人类共同价值", "D": "自由民主价值"}, "answer": "C", "explanation": "解析：全人类共同价值以联合国宪章为基础和行为准绳，其理论基础具有共识性，实践基础具有包容性，反映世界各国人民普遍认同的价值理念的最大公约数。题干所述应为全人类共同价值，因此选C。"}, {"id": 54, "num": "54", "section": "single", "type": "单选", "question": "新时代党解决台湾问题的总体方略，为新时代解决台湾问题、实现祖国完全统一指明了方向。（　）是祖国统一的最大障碍，是民族复兴的严重隐患，坚持粉碎其图谋是统一的必然要求。", "options": {"A": "经济发展水平不同", "B": "外部势力干涉", "C": "社会制度不同", "D": "“台独”分裂"}, "answer": "D", "explanation": "解析：教材指出，“台独”分裂是祖国统一的最大障碍，是民族复兴的严重隐患。坚持粉碎“台独”分裂图谋，是实现祖国完全统一的必然要求，因此选D。"}, {"id": 55, "num": "55", "section": "single", "type": "单选", "question": "历史和现实都证明，中国人民和中华民族之所以能够扭转近代以后的历史命运、取得今天的伟大成就，最根本的是（　）。", "options": {"A": "有中国共产党的坚强领导", "B": "有科学社会主义的基本原则", "C": "走新民主主义革命道路", "D": "走中国特色社会主义道路"}, "answer": "A", "explanation": "解析：历史和现实充分证明，中国人民和中华民族能够扭转近代以后的历史命运、取得今天的伟大成就，最根本的是有中国共产党的坚强领导，因此选A。"}, {"id": 56, "num": "56", "section": "single", "type": "单选", "question": "保障和改善民生没有终点，只有连续不断的新起点。（　）是民生之源，是改善民生、实现发展成果由人民共享最重要最直接的方式。", "options": {"A": "收入分配", "B": "社会治理", "C": "社会保障", "D": "稳定就业"}, "answer": "A", "explanation": "解析：收入分配是民生之源，是改善民生、实现发展成果由人民共享最重要、最直接的方式。社会保障、社会治理和稳定就业都与民生密切相关，但不对应题干中的规范表述，因此选A。"}, {"id": 57, "num": "57", "section": "single", "type": "单选", "question": "发展理念是发展行动的先导，是发展思路、发展方式、发展着力点的集中体现。新发展阶段必须坚定不移贯彻创新、协调、绿色、开放、共享的新发展理念。其中，创新是（　）。", "options": {"A": "中国特色社会主义的本质要求", "B": "引领发展的第一动力", "C": "国家繁荣发展的必由之路", "D": "持续健康发展的内在要求"}, "answer": "B", "explanation": "解析：创新是引领发展的第一动力。协调是持续健康发展的内在要求，开放是国家繁荣发展的必由之路，共享是中国特色社会主义的本质要求，因此选B。"}, {"id": 58, "num": "58", "section": "single", "type": "单选", "question": "（　），这是重要的发展理念，也是推进现代化建设的重大原则。这一重要论述阐明了经济发展和生态环境保护的关系，揭示了保护生态环境就是保护生产力、改善生态环境就是发展生产力的道理，指明了实现发展和保护协同共生的新路径。", "options": {"A": "山水林田湖草沙一体化治理", "B": "人与自然和谐共生", "C": "生态文明建设", "D": "绿水青山就是金山银山"}, "answer": "D", "explanation": "解析：“绿水青山就是金山银山”是重要的发展理念，也是推进现代化建设的重大原则。它阐明了经济发展和生态环境保护的辩证统一关系，揭示了保护生态环境就是保护生产力、改善生态环境就是发展生产力的道理，并指明了发展和保护协同共生的新路径，因此选D。"}, {"id": 59, "num": "59", "section": "single", "type": "单选", "question": "坚持和加强党的全面领导，坚持党要管党、全面从严治党，以（　）为根基。", "options": {"A": "坚定理想信念宗旨", "B": "加强党的长期执政能力建设、先进性和纯洁性建设", "C": "党的政治建设", "D": "调动全党积极性、主动性、创造性"}, "answer": "A", "explanation": "解析：新时代党的建设总要求明确，以加强党的长期执政能力建设、先进性和纯洁性建设为主线，以党的政治建设为统领，以坚定理想信念宗旨为根基，以调动全党积极性、主动性、创造性为着力点。因此题干所问“根基”对应坚定理想信念宗旨，选A。"}, {"id": 60, "num": "60", "section": "single", "type": "单选", "question": "如期实现建军一百年奋斗目标，加快把人民军队建成世界一流军队，是全面建设社会主义现代化国家的战略要求。开创国防和军队现代化新局面，下列表述错误的是（　）。", "options": {"A": "牢固树立政治工作这个唯一的根本的标准，坚决破除“和平积弊”", "B": "党在新时代的强军目标是建设一支听党指挥、能打胜仗、作风优良的人民军队，把人民军队建设成为世界一流军队", "C": "巩固国防和强大人民军队是新时代坚持和发展中国特色社会主义、实现中华民族伟大复兴的战略支撑", "D": "党对军队的绝对领导是人民军队的建军之本、强军之魂"}, "answer": "A", "explanation": "解析：军队建设必须牢固确立战斗力这个唯一的根本标准，而不是把政治工作表述为唯一的根本标准。政治工作是人民军队的生命线。其余三项分别符合新时代强军目标、巩固国防和强军的战略支撑地位以及党对军队绝对领导的规范表述，因此A错误。"}, {"id": 61, "num": "61", "section": "single", "type": "单选", "question": "（　）是新时代我国经济社会发展的鲜明主题，是全面建设社会主义现代化国家的首要任务。", "options": {"A": "实施扩大内需战略", "B": "改革创新", "C": "高质量发展", "D": "加快构建新发展格局"}, "answer": "C", "explanation": "解析：高质量发展是新时代我国经济社会发展的鲜明主题，也是全面建设社会主义现代化国家的首要任务。实施扩大内需战略和加快构建新发展格局是推动高质量发展的重要举措，改革创新是重要动力，但均不对应题干中的规范定位，因此选C。"}, {"id": 62, "num": "62", "section": "single", "type": "单选", "question": "进入新时代，我国改革进入攻坚期和深水区，发展中积累的问题和发展后的新问题、一般矛盾和深层次矛盾、有待完成的任务和新提出的任务交织叠加、错综复杂。（　）是完成新时代目标任务的必然要求。", "options": {"A": "全面从严治党", "B": "全面深化改革开放", "C": "全面建设社会主义现代化国家", "D": "全面依法治国"}, "answer": "B", "explanation": "解析：进入新时代，我国改革进入攻坚期和深水区，各类问题和矛盾交织叠加，只有通过全面深化改革开放才能破解发展难题、完成新时代目标任务，因此选B。全面从严治党、全面依法治国和全面建设社会主义现代化国家均属重要战略部署，但与题干所述改革情境不直接对应。"}, {"id": 63, "num": "63", "section": "single", "type": "单选", "question": "习近平指出，全面深化改革，全面者，就是要统筹推进各领域改革，就需要有管总的目标，也要回答推进各领域改革最终是为了什么、要取得什么样的整体结果这个问题。全面深化改革的总目标是（　）。", "options": {"A": "赋予社会主义新的生机活力，推进国家治理体系和治理能力现代化", "B": "完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化", "C": "进一步解放思想、发展社会生产力", "D": "推进国家治理体系和治理能力现代化"}, "answer": "B", "explanation": "解析：全面深化改革的总目标是完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化，两句话构成完整统一的目标，缺一不可，因此选B。"}, {"id": 64, "num": "1", "section": "multi", "type": "多选", "question": "党的二十大提出的“六个必须坚持”，是习近平新时代中国特色社会主义思想的世界观、方法论和贯穿其中的立场观点方法的重要体现。“六个必须坚持”，就是必须坚持人民至上、必须坚持自信自立、必须坚持守正创新、（　）。", "options": {"A": "必须坚持系统观念", "B": "必须坚持实事求是", "C": "必须坚持问题导向", "D": "必须坚持胸怀天下"}, "answer": "ACD", "explanation": "解析：教材导论明确指出，“六个必须坚持”包括人民至上、自信自立、守正创新、问题导向、系统观念、胸怀天下。题干已列出前三项，剩余三项为系统观念、问题导向和胸怀天下。实事求是虽是党的重要思想路线，但不属于“六个必须坚持”的规范表述。"}, {"id": 65, "num": "2", "section": "multi", "type": "多选", "question": "中国特色社会主义事业总体布局是经济建设、（　）、生态文明建设“五位一体”。", "options": {"A": "文化建设", "B": "社会建设", "C": "民生建设", "D": "政治建设"}, "answer": "ABD", "explanation": "解析：教材明确指出，中国特色社会主义事业总体布局是经济建设、政治建设、文化建设、社会建设、生态文明建设“五位一体”。民生建设是重要工作内容，但不是“五位一体”的独立组成部分。"}, {"id": 66, "num": "3", "section": "multi", "type": "多选", "question": "“草木植成，国之富也。”近年来，我国多地积极探索生态产品价值实现路径，将生态产品资源最优化配置，“两山”理念的转化之路愈发宽广，生态带来的民生福祉展现得愈发鲜活生动。由此可见，绿水青山是（　）。", "options": {"A": "经济财富", "B": "生态财富", "C": "社会财富", "D": "自然财富"}, "answer": "ABCD", "explanation": "解析：教材指出，绿水青山既是自然财富、生态财富，又是社会财富、经济财富。良好生态环境不仅具有自然和生态价值，还能通过生态产品价值实现转化为经济发展优势，并增进社会民生福祉。"}, {"id": 67, "num": "4", "section": "multi", "type": "多选", "question": "坚持中国特色社会主义文化发展道路，要坚持“二为”方向、“双百”方针。“二为”方向是（　）。", "options": {"A": "为建设社会主义现代化国家", "B": "为中国共产党治国理政服务", "C": "为人民服务", "D": "为社会主义服务"}, "answer": "CD", "explanation": "解析：“二为”方向是为人民服务、为社会主义服务；“双百”方针是百花齐放、百家争鸣。A、B不属于“二为”方向的规范表述。"}, {"id": 68, "num": "5", "section": "multi", "type": "多选", "question": "习近平指出，当今世界，要说哪个政党、哪个国家、哪个民族能够自信的话，那中国共产党、中华人民共和国、中华民族是最有理由自信的。这是因为，我们有（　）。", "options": {"A": "更为完善的制度保证、更为坚实的物质基础、更为主动的精神力量", "B": "连绵不绝的中华5000多年文明", "C": "中国共产党的坚强领导", "D": "成为世界各国领导者的实力"}, "answer": "ABC", "explanation": "解析：教材指出，中国共产党、中华人民共和国、中华民族最有理由自信，是因为有中国共产党的坚强领导，有更为完善的制度保证、更为坚实的物质基础、更为主动的精神力量，还有连绵不绝的中华五千多年文明。D项不是教材表述。"}, {"id": 69, "num": "6", "section": "multi", "type": "多选", "question": "当前我国国家安全内涵和外延比历史上任何时候都要丰富，时空领域比历史上任何时候都要宽广，内外因素比历史上任何时候都要复杂，必须坚持总体国家安全观。总体国家安全观以人民安全为宗旨（　）。", "options": {"A": "以促进国际安全为依托", "B": "以政治安全为基础", "C": "以经济安全为根本", "D": "以军事、科技、文化、社会安全为保障"}, "answer": "AD", "explanation": "解析：总体国家安全观的规范表述是：以人民安全为宗旨，以政治安全为根本，以经济安全为基础，以军事、科技、文化、社会安全为保障，以促进国际安全为依托。因此A、D正确，B、C把“根本”和“基础”颠倒了。"}, {"id": 70, "num": "7", "section": "multi", "type": "多选", "question": "习近平指出：“我们既要绿水青山，也要金山银山。宁要绿水青山，不要金山银山，而且绿水青山就是金山银山。”这是重要的发展理念，也是推进现代化建设的重大原则。绿水青山就是金山银山（　）。", "options": {"A": "指明了实现发展和保护协同共生的新路径", "B": "阐述了经济发展和生态环境保护的关系", "C": "表明生态环境保护可以舍弃经济发展", "D": "揭示了保护生态环境就是保护生产力、改善生态环境就是发展生产力的道理"}, "answer": "ABD", "explanation": "解析：“绿水青山就是金山银山”阐述了经济发展和生态环境保护的关系，揭示了保护生态环境就是保护生产力、改善生态环境就是发展生产力的道理，并指明了发展和保护协同共生的新路径。它并不主张舍弃经济发展。"}, {"id": 71, "num": "8", "section": "multi", "type": "多选", "question": "人民民主是社会主义的生命，全过程人民民主（　）。", "options": {"A": "是新时代我国民主政治领域具有重大创新意义的标志性成果", "B": "植根于我国社会主义民主的长期实践", "C": "是人民当家作主和依法治国的根本保证", "D": "是社会主义民主政治的本质属性"}, "answer": "ABD", "explanation": "解析：教材指出，全过程人民民主植根于我国社会主义民主的长期实践，是社会主义民主政治的本质属性，也是新时代我国民主政治领域具有重大创新意义的标志性成果。党的领导才是人民当家作主和依法治国的根本保证。"}, {"id": 72, "num": "9", "section": "multi", "type": "多选", "question": "就业是最大的（　），必须抓紧抓实抓好。充分就业则民心安、社会稳，如果就业出了问题、大规模失业则民心浮、社会乱。", "options": {"A": "育人工程", "B": "根基工程", "C": "民心工程", "D": "民生工程"}, "answer": "BCD", "explanation": "解析：教材指出，就业是最大的民生工程、民心工程、根基工程，必须抓紧抓实抓好。育人工程主要与教育和人才培养相关，不属于此处对就业的规范定位。"}, {"id": 73, "num": "10", "section": "multi", "type": "多选", "question": "要坚持党要管党、全面从严治党，以党的政治建设为统领，必须全面推进党的政治建设、（　），把制度建设贯穿其中，深入推进反腐败斗争，全面提高党的建设科学化水平。", "options": {"A": "组织建设", "B": "纪律建设", "C": "思想建设", "D": "作风建设"}, "answer": "ABCD", "explanation": "解析：教材指出，以党的政治建设为统领，全面推进党的政治建设、思想建设、组织建设、作风建设、纪律建设，把制度建设贯穿其中，深入推进反腐败斗争。因此四项均正确。"}, {"id": 74, "num": "11", "section": "multi", "type": "多选", "question": "党的二十大报告强调，未来五年是全面建设社会主义现代化国家开局起步的关键时期。要想开辟发展新领域新赛道，不断塑造发展新动能新优势，就必须不断强化全面建设社会主义现代化国家的基础性、战略性支撑。必须坚持（　）。", "options": {"A": "人才是第一资源", "B": "科技是第一生产力", "C": "社保是第一兜底", "D": "创新是第一动力"}, "answer": "ABD", "explanation": "解析：教材第七章指出，必须坚持科技是第一生产力、人才是第一资源、创新是第一动力。社保是重要民生保障，但“社保是第一兜底”不是此处的规范表述。"}, {"id": 75, "num": "12", "section": "multi", "type": "多选", "question": "教育是国之大计、党之大计，是民族振兴、社会进步的基石。建设教育强国是（　）。", "options": {"A": "全面建成社会主义现代化强国的战略先导", "B": "以中国式现代化全面推进中华民族伟大复兴的基础工程", "C": "促进全体人民共同富裕的有效途径", "D": "实现高水平科技自立自强的重要支撑"}, "answer": "ABCD", "explanation": "解析：教材指出，建设教育强国是全面建成社会主义现代化强国的战略先导，是以中国式现代化全面推进中华民族伟大复兴的基础工程，是促进全体人民共同富裕的有效途径，也是实现高水平科技自立自强的重要支撑。"}, {"id": 76, "num": "13", "section": "multi", "type": "多选", "question": "中国特色社会主义事业战略布局是（　）、全面从严治党“四个全面”。", "options": {"A": "全面对外开放", "B": "全面建设社会主义现代化国家", "C": "全面依法治国", "D": "全面深化改革"}, "answer": "BCD", "explanation": "解析：中国特色社会主义事业战略布局是全面建设社会主义现代化国家、全面深化改革、全面依法治国、全面从严治党“四个全面”。全面对外开放不属于“四个全面”的规范表述。"}, {"id": 77, "num": "14", "section": "multi", "type": "多选", "question": "习近平强调，我们的改革开放是有方向、有立场、有原则的。要保持战略定力，牢牢把握全面深化改革开放的正确方向，确保改革不改向、变革不变色。坚持全面深化改革开放的正确方向，必须（　）。", "options": {"A": "坚持以人民为中心，促进社会公平正义、增进人民福祉", "B": "坚持和改善党的全面领导、坚持和完善中国特色社会主义制度", "C": "有利于进一步解放思想、进一步解放和发展社会生产力、进一步解放和增强社会活力", "D": "把保持经济高速增长摆在更为突出的位置，发展新质生产力"}, "answer": "ABC", "explanation": "解析：教材强调，坚持全面深化改革开放的正确方向，必须坚持和改善党的全面领导、坚持和完善中国特色社会主义制度，坚持以人民为中心，并做到有利于进一步解放思想、进一步解放和发展社会生产力、进一步解放和增强社会活力。新时代发展强调高质量发展，而不是把保持经济高速增长置于更突出位置。"}, {"id": 78, "num": "15", "section": "multi", "type": "多选", "question": "全党要更加自觉地坚定党性原则，勇于直面问题，敢于刮骨疗毒，消除一切损害党的先进性和纯洁性的因素，清除一切侵蚀党的健康肌体的病毒，不断增强党的（　），确保我们党永葆旺盛生命力和强大战斗力。", "options": {"A": "群众组织力", "B": "社会号召力", "C": "政治领导力", "D": "思想引领力"}, "answer": "ABCD", "explanation": "解析：教材指出，要不断增强党的政治领导力、思想引领力、群众组织力、社会号召力，确保党永葆旺盛生命力和强大战斗力。因此四项均正确。"}, {"id": 79, "num": "16", "section": "multi", "type": "多选", "question": "全面深化改革的总目标是完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化。国家治理体系和治理能力是一个有机整体，相辅相成（　）。", "options": {"A": "提高国家治理能力才能充分发挥国家治理体系的效能", "B": "有了好的国家治理体系才能提高国家治理能力", "C": "国家治理体系和国家治理能力是等同的", "D": "国家治理体系越完备国家治理能力就一定越强"}, "answer": "AB", "explanation": "解析：教材指出，有了好的国家治理体系，才能提高国家治理能力；提高国家治理能力，才能充分发挥国家治理体系的效能。二者相互联系但不等同，治理体系完备也不会自动转化为强大治理能力。"}, {"id": 80, "num": "17", "section": "multi", "type": "多选", "question": "中国特色社会主义文化发展道路，是推动社会主义文化繁荣兴盛的唯一正确道路。坚持中国特色社会主义文化发展道路，必须（　）。", "options": {"A": "提高我国综合国力和国际地位", "B": "坚持“二为”方向、“双百”方针", "C": "坚持举旗帜、聚民心、育新人、兴文化、展形象", "D": "激发全民族文化创新创造活力"}, "answer": "BCD", "explanation": "解析：教材指出，坚持中国特色社会主义文化发展道路，必须坚持“二为”方向、“双百”方针，坚持举旗帜、聚民心、育新人、兴文化、展形象，并激发全民族文化创新创造活力。提高综合国力和国际地位是文化发展的积极作用，不是此处列举的具体要求。"}, {"id": 81, "num": "18", "section": "multi", "type": "多选", "question": "高质量发展关系我国社会主义现代化建设全局，具有重大战略意义。高质量发展（　）。", "options": {"A": "是维护国家长治久安的必然要求", "B": "为全面建设社会主义现代化国家提供更为坚实的物质基础", "C": "是民族复兴的根基、国家强盛的前提", "D": "是不断满足人民对美好生活需要的重要保证"}, "answer": "ABD", "explanation": "解析：教材指出，高质量发展为全面建设社会主义现代化国家提供更为坚实的物质基础，是不断满足人民对美好生活需要的重要保证，也是维护国家长治久安的必然要求。“民族复兴的根基、国家强盛的前提”不是教材对高质量发展的规范定位。"}, {"id": 82, "num": "19", "section": "multi", "type": "多选", "question": "党的十八大以来，以习近平同志为核心的党中央把生态文明建设作为关系中华民族永续发展的根本大计，开展了一系列开创性工作，决心之大、力度之大、成效之大前所未有，生态文明建设从理论到实践都发生了历史性、转折性、全局性变化，美丽中国建设迈出重大步伐。这主要体现在（　）。", "options": {"A": "实现由实践探索到科学理论指导的重大转变", "B": "实现由被动应对到主动作为的重大转变", "C": "实现由全球环境治理参与者到引领者的重大转变", "D": "实现由重点整治到系统治理的重大转变"}, "answer": "ABCD", "explanation": "解析：教材概括了生态文明建设的四个重大转变：由实践探索到科学理论指导、由重点整治到系统治理、由被动应对到主动作为、由全球环境治理参与者到引领者。因此四项均正确。"}, {"id": 83, "num": "20", "section": "multi", "type": "多选", "question": "中国共产党致力于为中国人民谋幸福、为中华民族谋复兴，同时也致力于为世界谋大同。中国特色大国外交牢牢把握（　）这条主线。", "options": {"A": "服务民族复兴", "B": "实现国家富强", "C": "促进人类进步", "D": "构建人类命运共同体"}, "answer": "AC", "explanation": "解析：教材第十六章指出，中国特色大国外交牢牢把握服务民族复兴、促进人类进步这条主线。构建人类命运共同体是重要理念和目标，但不是题干所问的这条主线。"}, {"id": 84, "num": "21", "section": "multi", "type": "多选", "question": "全过程人民民主，是中国共产党团结带领人民追求民主、发展民主、实现民主的伟大创造，是新时代我国民主政治领域具有重大创新意义的标志性成果。全过程人民民主是（　）。", "options": {"A": "全覆盖的民主", "B": "全方位的民主", "C": "全负荷的民主", "D": "全链条的民主"}, "answer": "ABD", "explanation": "解析：教材第八章指出，全过程人民民主是全链条、全方位、全覆盖的民主。“全负荷的民主”不是教材中的规范表述。"}, {"id": 85, "num": "22", "section": "multi", "type": "多选", "question": "人民性是马克思主义的本质属性和鲜明品格，人民对美好生活的向往就是党的奋斗目标，要坚持以人民为中心。以下说法正确的有（　）。", "options": {"A": "人民是党的工作的最高裁决者和最终评判者", "B": "人民是中国共产党执政的最大底气、最深厚的根基", "C": "人民立场是中国共产党的根本政治立场", "D": "人民立场是我们党区别于其他政党的显著标志"}, "answer": "ABCD", "explanation": "解析：教材第六章指出，人民是党的工作的最高裁决者和最终评判者，是中国共产党执政的最大底气、最深厚根基；人民立场是中国共产党的根本政治立场，也是我们党区别于其他政党的显著标志。因此四项均正确。"}, {"id": 86, "num": "23", "section": "multi", "type": "多选", "question": "建设强大的人民军队是我们党的不懈追求。在各个历史时期，我们党都根据形势任务的变化，明确提出人民军队建设发展的目标要求，引领我军建设不断向前发展。党在新时代的强军目标是建设一支（　）的人民军队，把人民军队建设成为世界一流军队。", "options": {"A": "能打胜仗", "B": "听党指挥", "C": "敢于创新", "D": "作风优良"}, "answer": "ABD", "explanation": "解析：教材第十四章指出，党在新时代的强军目标是建设一支听党指挥、能打胜仗、作风优良的人民军队，把人民军队建设成为世界一流军队。“敢于创新”不属于这一目标的三项规范表述。"}, {"id": 87, "num": "24", "section": "multi", "type": "多选", "question": "治理好我们这个大党和大国，必须坚持党的全面领导特别是党中央集中统一领导，发扬党的自我革命精神，解决好大党独有难题。习近平新时代中国特色社会主义思想，正是在党不断实现（　），以伟大自我革命引领伟大社会革命的过程中创立并不断丰富发展的。", "options": {"A": "自我净化", "B": "自我革新", "C": "自我提高", "D": "自我完善"}, "answer": "ABCD", "explanation": "解析：教材指出，党必须不断增强自我净化、自我完善、自我革新、自我提高能力，以伟大自我革命引领伟大社会革命。因此四项均正确。"}, {"id": 88, "num": "25", "section": "multi", "type": "多选", "question": "全过程人民民主既能确保人民充分享有各方面权利，又能有效促进国家治理高效和社会和谐稳定，维护和保障人民群众的根本利益，是（　）的民主。", "options": {"A": "最纯粹", "B": "最广泛", "C": "最真实", "D": "最管用"}, "answer": "BCD", "explanation": "解析：教材第八章指出，全过程人民民主是最广泛、最真实、最管用的民主。“最纯粹”不是教材中的规范概括。"}, {"id": 89, "num": "26", "section": "multi", "type": "多选", "question": "习近平指出，当前我国国家安全内涵和外延比历史上任何时候都要丰富，时空领域比历史上任何时候都要宽广，内外因素比历史上任何时候都要复杂。进入新时代，我国面临更为严峻复杂的国家安全形势，从内部环境来看主要是（　）。", "options": {"A": "重点领域关键环节改革任务仍然艰巨，科技创新能力存在卡点瓶颈", "B": "粮食、能源、资源、金融和产业链供应链安全面临重大考验", "C": "意识形态领域存在不少挑战，重点领域风险敞口加大", "D": "风险呈现形态更加复杂，和平与发展的时代主题面临严峻挑战"}, "answer": "ABC", "explanation": "解析：教材第十五章对内部安全环境的概括包括重点领域关键环节改革任务艰巨、科技创新能力存在卡点瓶颈，粮食、能源、资源、金融和产业链供应链安全面临考验，以及意识形态领域挑战和重点领域风险敞口加大。D项包含对外部国际环境的描述。"}, {"id": 90, "num": "27", "section": "multi", "type": "多选", "question": "改革开放以来我们取得一切成绩和进步的根本原因，归结起来就是：（　）。", "options": {"A": "发展了中国特色社会主义文化", "B": "确立了中国特色社会主义制度", "C": "开辟了中国特色社会主义道路", "D": "形成了中国特色社会主义理论体系"}, "answer": "ABCD", "explanation": "解析：教材第一章指出，改革开放以来取得一切成绩和进步的根本原因，归结起来就是开辟了中国特色社会主义道路，形成了中国特色社会主义理论体系，确立了中国特色社会主义制度，发展了中国特色社会主义文化。"}, {"id": 91, "num": "28", "section": "multi", "type": "多选", "question": "高质量发展是全面建设社会主义现代化国家的首要任务。高质量发展，就是（　）。", "options": {"A": "能够很好满足人民日益增长的美好生活需要的发展", "B": "创新成为第一动力、协调成为内生特点、绿色成为普遍形态、开放成为必由之路、共享成为根本目的的发展", "C": "体现新发展理念的发展", "D": "从“有没有”转向“好不好”的发展"}, "answer": "ABCD", "explanation": "解析：教材第六章指出，高质量发展是能够很好满足人民日益增长的美好生活需要的发展，是体现新发展理念的发展，也是创新、协调、绿色、开放、共享特征充分体现的发展，更明确地说就是从“有没有”转向“好不好”。因此四项均正确。"}, {"id": 92, "num": "29", "section": "multi", "type": "多选", "question": "党的政治建设是党的根本性建设。发挥党的政治建设的统领性作用，必须（　）。", "options": {"A": "站稳政治立场", "B": "把准政治方向", "C": "提高政治能力", "D": "营造良好政治生态"}, "answer": "ABCD", "explanation": "解析：教材指出，发挥党的政治建设的统领性作用，必须把准政治方向、站稳政治立场、营造良好政治生态、提高政治能力。因此四项均正确。"}, {"id": 93, "num": "30", "section": "multi", "type": "多选", "question": "政绩为谁而树、树什么样的政绩、靠什么树政绩，是一个必须认真回答的重大问题。领导干部应该树立的政绩观是（　）。", "options": {"A": "把为民办事、为民造福作为最重要的政绩", "B": "以国内生产总值增长率论英雄", "C": "把为老百姓办了多少好事实事作为检验政绩的重要标准", "D": "“功成不必在我”的精神境界和“功成必定有我”的历史担当"}, "answer": "ACD", "explanation": "解析：正确政绩观要求把为民办事、为民造福作为最重要的政绩，把为老百姓办了多少好事实事作为检验政绩的重要标准，并具有“功成不必在我”的精神境界和“功成必定有我”的历史担当，不能简单以国内生产总值增长率论英雄。"}, {"id": 94, "num": "31", "section": "multi", "type": "多选", "question": "走和平发展道路是基于中国历史文化传统作出的必然选择。中华民族是爱好和平的民族，中华文明具有突出的和平性。中国自古就有“国虽大，好战必亡”的箴言，（　）等理念世代相传。", "options": {"A": "“天下大同”", "B": "“和而不同”", "C": "“以和为贵”", "D": "“睦邻友邦”"}, "answer": "ABCD", "explanation": "解析：“天下大同”“和而不同”“以和为贵”“睦邻友邦”都体现中华文明崇尚和平、协和万邦、亲仁善邻的文化传统，因此四项均正确。"}, {"id": 95, "num": "32", "section": "multi", "type": "多选", "question": "党的二十大集中概括了中国式现代化的中国特色，深刻揭示了中国式现代化的科学内涵，这是理论概括，也是实践要求。中国式现代化是人口规模巨大的现代化，是（　）。", "options": {"A": "走和平发展道路的现代化", "B": "全体人民共同富裕的现代化", "C": "人与自然和谐共生的现代化", "D": "物质文明和精神文明相协调的现代化"}, "answer": "ABCD", "explanation": "解析：中国式现代化具有五个方面的中国特色，即人口规模巨大的现代化、全体人民共同富裕的现代化、物质文明和精神文明相协调的现代化、人与自然和谐共生的现代化、走和平发展道路的现代化。题干已经给出第一项，其余四项均正确。"}, {"id": 96, "num": "33", "section": "multi", "type": "多选", "question": "法治是治国理政的基本方式。全面依法治国是（　）。", "options": {"A": "完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化的重要方面", "B": "坚持和发展中国特色社会主义的本质要求和重要保障", "C": "“四个全面”战略布局之一", "D": "国家治理的一场深刻革命，关系党执政兴国，关系人民幸福安康"}, "answer": "ABCD", "explanation": "解析：全面依法治国是坚持和发展中国特色社会主义的本质要求和重要保障，是“四个全面”战略布局的重要组成部分，是国家治理的一场深刻革命，也是完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化的重要方面。因此四项均正确。"}, {"id": 97, "num": "34", "section": "multi", "type": "多选", "question": "马克思主义是我们立党立国、兴党兴国的根本指导思想。坚持马克思主义在意识形态领域指导地位的根本制度，必须（　）。", "options": {"A": "牢牢掌握党对意识形态工作领导权", "B": "全面落实意识形态工作责任制，压紧压实做好意识形态工作的政治责任", "C": "坚持以立为本、立破并举，提高政治自觉，把意识形态阵地建设和管理工作摆在重要位置", "D": "要切实把坚持以马克思主义为指导体现到理论武装、舆论引导、思想道德建设、文化文艺等各方面"}, "answer": "ABCD", "explanation": "解析：坚持马克思主义在意识形态领域指导地位的根本制度，必须牢牢掌握党对意识形态工作的领导权，全面落实意识形态工作责任制，坚持以立为本、立破并举，加强意识形态阵地建设和管理，并把马克思主义指导体现到理论武装、舆论引导、思想道德建设、文化文艺等各方面。因此四项均正确。"}, {"id": 98, "num": "35", "section": "multi", "type": "多选", "question": "中国共产党作为最高政治领导力量（　）。", "options": {"A": "是由我国国家性质和政治制度体系决定的", "B": "得到了各民主党派、各团体、各民族、各阶层、各界人士的支持和拥护", "C": "得到了最广大人民群众的支持和拥护", "D": "是由中华民族伟大复兴事业决定的"}, "answer": "ABCD", "explanation": "解析：中国共产党作为最高政治领导力量，是由我国国家性质和政治制度体系决定的，也是由中华民族伟大复兴事业决定的，得到了最广大人民群众以及各民主党派、各团体、各民族、各阶层、各界人士的支持和拥护。因此四项均正确。"}, {"id": 99, "num": "36", "section": "multi", "type": "多选", "question": "政治领导力是马克思主义政党第一位的能力，全面加强党的领导大大提高了全党的政治判断力、政治领悟力、政治执行力，使广大党员干部（　），自觉在思想上政治上行动上同以习近平同志为核心的党中央保持高度一致，确保党中央权威和集中统一领导，确保党发挥总揽全局、协调各方的领导核心作用。", "options": {"A": "做到“两个维护”", "B": "增强“四个意识”", "C": "坚定“四个自信”", "D": "认清“两个大局”"}, "answer": "ABC", "explanation": "解析：全面加强党的领导，要求广大党员干部增强“四个意识”、坚定“四个自信”、做到“两个维护”，自觉同党中央保持高度一致。“认清两个大局”是把握形势的重要要求，但不属于题干这组固定政治要求。"}, {"id": 100, "num": "37", "section": "multi", "type": "多选", "question": "党的十八大以来，以习近平同志为核心的党中央把强军兴军融入强国复兴进程，谋篇布局、前瞻运筹、深远经略，对全面推进国防和军队现代化作出战略安排。到本世纪中叶把人民军队全面建成世界一流军队，包括（　）。", "options": {"A": "建成能够全面有效维护国家安全的世界一流军队", "B": "建成同我国强国地位相称的世界一流军队", "C": "建成具备强大国际影响力的世界一流军队", "D": "建成能够影响他国政治安全的世界一流军队"}, "answer": "ABC", "explanation": "解析：到本世纪中叶全面建成世界一流军队，包括建成同我国强国地位相称、能够全面有效维护国家安全、具备强大国际影响力的世界一流军队。我国坚持防御性国防政策，不以影响他国政治安全为目标，因此D错误。"}, {"id": 101, "num": "38", "section": "multi", "type": "多选", "question": "教育、科技、人才是全面建设社会主义现代化国家的基础性、战略性支撑。全面建设社会主义现代化国家（　）。", "options": {"A": "必须坚持科技是第一生产力、人才是第一资源、创新是第一动力", "B": "必须坚持教育优先发展、科技自立自强、人才引领驱动", "C": "必须深入实施科教兴国战略、人才强国战略、创新驱动发展战略", "D": "教育是根本，科技是关键，人才是基础"}, "answer": "ABCD", "explanation": "解析：全面建设社会主义现代化国家，必须坚持科技是第一生产力、人才是第一资源、创新是第一动力，坚持教育优先发展、科技自立自强、人才引领驱动，深入实施科教兴国战略、人才强国战略、创新驱动发展战略。教育是根本，科技是关键，人才是基础，因此四项均正确。"}, {"id": 102, "num": "39", "section": "multi", "type": "多选", "question": "全面深化改革开放必须有利于进一步解放思想、进一步解放和发展社会生产力、进一步解放和增强社会活力。这“三个进一步解放”既是改革的目的，又是改革的条件。其中，解放和增强社会活力是（　）。", "options": {"A": "社会主义改革的内在要求和基本目的", "B": "新时代全面深化改革的关键所在", "C": "改革开放的鲜明特征和首要任务", "D": "开启改革开放事业的思想前提"}, "answer": "AB", "explanation": "解析：解放思想是开启改革开放事业的思想前提，解放和发展社会生产力是改革开放的鲜明特征和首要任务，解放和增强社会活力是社会主义改革的内在要求和基本目的，也是新时代全面深化改革的关键所在。因此A、B正确。"}, {"id": 103, "num": "40", "section": "multi", "type": "多选", "question": "中国特色社会主义事业总体布局是经济建设、______、文化建设、______、生态文明建设五位一体。（　）", "options": {"A": "文明建设", "B": "社会建设", "C": "教育建设", "D": "政治建设"}, "answer": "BD", "explanation": "解析：中国特色社会主义事业总体布局是经济建设、政治建设、文化建设、社会建设、生态文明建设“五位一体”。题干已经给出经济建设、文化建设和生态文明建设，因此两个空缺分别是政治建设和社会建设，B、D正确。"}, {"id": 104, "num": "41", "section": "multi", "type": "多选", "question": "全面深化改革的总目标是完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化。国家治理体系和治理能力是一个有机整体，相辅相成（　）。", "options": {"A": "国家治理体系越完善国家治理能力就一定越强", "B": "国家治理体系和国家治理能力是等同的", "C": "有了好的国家治理体系才能提高国家治理能力", "D": "提高国家治理能力才能充分发挥国家治理体系的效能"}, "answer": "CD", "explanation": "解析：国家治理体系和治理能力是一个有机整体，相辅相成。有了好的国家治理体系，才能提高国家治理能力；提高国家治理能力，才能充分发挥国家治理体系的效能。二者相互联系但并不等同，治理体系完善也不会自动意味着治理能力一定强，因此C、D正确。"}, {"id": 105, "num": "42", "section": "multi", "type": "多选", "question": "中国特色大国外交牢牢把握（　）这条主线。", "options": {"A": "构建人类命运共同体", "B": "服务民族复兴", "C": "实现国家富强", "D": "促进人类进步"}, "answer": "BD", "explanation": "解析：教材明确指出，中国特色大国外交牢牢把握服务民族复兴、促进人类进步这条主线。构建人类命运共同体是重要理念和目标，实现国家富强是国家发展的重要目标，但都不属于题干所问的这条规范主线，因此B、D正确。"}, {"id": 106, "num": "43", "section": "multi", "type": "多选", "question": "作为一项基本国策，“一国两制”制度以宪法和基本法为基础，保持香港、澳门原有的资本主义制度和生活方式不变、法律基本不变；作为直辖于中央人民政府的香港、澳门特别行政区，享有（　）。", "options": {"A": "行政管理权", "B": "独立的司法权和终审权", "C": "独立的外交权", "D": "立法权"}, "answer": "ABD", "explanation": "解析：香港、澳门特别行政区依法享有高度自治权，包括行政管理权、立法权、独立的司法权和终审权。外交事务属于中央事权，特别行政区不享有独立的外交权，因此A、B、D正确。"}, {"id": 107, "num": "44", "section": "multi", "type": "多选", "question": "中国梦是（　）的梦，中国人民愿意同各国人民在实现各自梦想的过程中相互支持、相互帮助，在推动实现持久和平、共同繁荣世界梦的崇高事业中作出更大贡献。", "options": {"A": "和平", "B": "发展", "C": "合作", "D": "共赢"}, "answer": "ABCD", "explanation": "解析：中国梦不仅造福中国人民，也造福世界人民，是和平、发展、合作、共赢的梦。中国人民愿同各国人民相互支持、相互帮助，共同推进持久和平、共同繁荣的世界梦，因此四项均正确。"}, {"id": 108, "num": "45", "section": "multi", "type": "多选", "question": "依靠人民创造历史伟业，必须尊重人民首创精神，就要（　）。", "options": {"A": "替民做主、为民做主、由民作主相统一", "B": "激发人民群众的创新创造活力", "C": "及时发现、总结、概括人民群众实践中形成的新鲜经验", "D": "尊重实践、尊重创造"}, "answer": "BCD", "explanation": "解析：尊重人民首创精神，必须尊重实践、尊重创造，充分激发人民群众的创新创造活力，并及时发现、总结、概括人民群众实践中形成的新鲜经验。A项“替民做主、为民做主”不符合人民主体地位，因此B、C、D正确。"}, {"id": 109, "num": "46", "section": "multi", "type": "多选", "question": "全面依法治国涉及一系列重大关系、利益格局和体制机制问题。关于政治和法治的关系，下列说法正确的是（　）。", "options": {"A": "政治和法治相互依存、相互作用、密不可分", "B": "法治要脱离政治的影响，才能确保公平正义", "C": "法治当中有政治，没有脱离政治的法治", "D": "党和法的关系是政治和法治关系的集中反映"}, "answer": "ACD", "explanation": "解析：政治和法治相互依存、相互作用、密不可分，法治当中有政治，没有脱离政治的法治；党和法的关系是政治和法治关系的集中反映。法治不可能脱离政治而独立存在，因此B错误，A、C、D正确。"}, {"id": 110, "num": "47", "section": "multi", "type": "多选", "question": "新时代坚持和发展中国特色社会主义，必须坚定道路自信、（　）。", "options": {"A": "理论自信", "B": "文化自信", "C": "制度自信", "D": "民族自信"}, "answer": "ABC", "explanation": "解析：“四个自信”是道路自信、理论自信、制度自信、文化自信。题干已经给出道路自信，因此还应选择理论自信、文化自信和制度自信，D项不属于“四个自信”的规范表述。"}, {"id": 111, "num": "48", "section": "multi", "type": "多选", "question": "党在新时代的强军目标，是深刻总结我们党建军治军的成功经验，适应国际战略形势和国家安全环境发展的重大变化，着眼于解决军队建设所面临的突出矛盾和问题作出的战略决策。关于强军目标的科学内涵，下列表述正确的是（　）。", "options": {"A": "能打胜仗是核心，反映军队的根本职能和军队建设的根本指向", "B": "作风优良是保证，关系军队的性质、宗旨、本色", "C": "听党指挥是灵魂，决定军队建设的政治方向", "D": "体现了坚持党的建军原则、人民军队根本职能、特有政治优势的高度统一"}, "answer": "ABCD", "explanation": "解析：听党指挥是灵魂，决定军队建设的政治方向；能打胜仗是核心，反映军队的根本职能和军队建设的根本指向；作风优良是保证，关系军队的性质、宗旨、本色。三者体现了党的建军原则、人民军队根本职能和特有政治优势的高度统一，因此四项均正确。"}, {"id": 112, "num": "49", "section": "multi", "type": "多选", "question": "全面建成小康社会的重大意义是（　）。", "options": {"A": "意味着中华民族实现千百年来的夙愿", "B": "是实现中华民族伟大复兴征程中的关键一步", "C": "表明我国已经实现了由高速发展向高质量发展转变", "D": "表明我国发展和人民生活水平跃上新的大台阶"}, "answer": "ABD", "explanation": "解析：全面建成小康社会意味着中华民族千百年来的夙愿成为现实，是实现中华民族伟大复兴征程中的关键一步，也标志着我国发展和人民生活水平跃上新的大台阶。C项“已经实现由高速发展向高质量发展转变”表述过于绝对，因此选A、B、D。"}, {"id": 113, "num": "50", "section": "multi", "type": "多选", "question": "作为一项基本国策，“一国两制”制度以宪法和基本法为基础，保持香港、澳门原有的资本主义制度和生活方式不变，法律基本不变；作为直接于中央人民政府的香港、澳门特别行政区，享有（　）。", "options": {"A": "独立的司法权和终审权", "B": "独立的外交权", "C": "行政管理权", "D": "立法权"}, "answer": "ACD", "explanation": "解析：香港、澳门特别行政区依法享有高度自治权，包括行政管理权、立法权、独立的司法权和终审权。外交事务属于中央事权，特别行政区不享有独立的外交权，因此A、C、D正确。题干中的“直接于”应为“直辖于”，但不影响答案判断。"}, {"id": 114, "num": "51", "section": "multi", "type": "多选", "question": "治理好我们这个党和大国，必须坚持党的全面领导特别是党中央集中统一领导，发扬党的自我革命精神，解决好大党独有难题。习近平新时代中国特色社会主义思想，正是在党不断实现（　），以伟大自我革命引领伟大社会革命的过程中创立并不断丰富发展的。", "options": {"A": "自我完善", "B": "自我革新", "C": "自我提高", "D": "自我净化"}, "answer": "ABCD", "explanation": "解析：党的自我革命能力集中体现为自我净化、自我完善、自我革新、自我提高，四者相互联系、相互支撑，共同构成党依靠自身力量发现问题、纠正偏差、推动创新、实现整体提升的重要机制，因此四项均正确。题干中的“党和大国”应为“大党和大国”，但不影响答案判断。"}, {"id": 115, "num": "52", "section": "multi", "type": "多选", "question": "马克思主义是我们立党立国、兴党兴国的根本指导思想。坚持马克思主义在意识形态领域指导地位的根本制度，必须（　）。", "options": {"A": "牢牢掌握党对意识形态工作领导权", "B": "坚持以立为本、立破并举，提高政治自觉，把意识形态阵地建设和管理工作摆在重要位置", "C": "要切实坚持以马克思主义为指导体现到理论武装、舆论引导、思想道德建设、文化文艺等各方面", "D": "全面落实意识形态工作责任制，压紧压实做好意识形态工作的政治责任"}, "answer": "ABCD", "explanation": "解析：坚持马克思主义在意识形态领域指导地位的根本制度，必须牢牢掌握党对意识形态工作的领导权，全面落实意识形态工作责任制，坚持以立为本、立破并举，加强意识形态阵地建设和管理，并把马克思主义指导体现到理论武装、舆论引导、思想道德建设、文化文艺等各方面，因此四项均正确。C项规范表述应为“要切实把坚持以马克思主义为指导体现到……”，原题漏写“把”字，但不影响答案判断。"}, {"id": 116, "num": "53", "section": "multi", "type": "多选", "question": "中国共产党是最高政治领导力量，党的领导是（　）。", "options": {"A": "全面的", "B": "分散的", "C": "系统的", "D": "整体的"}, "answer": "ACD", "explanation": "解析：教材明确指出，党的领导是全面的、系统的、整体的，必须落实到党和国家事业各领域各方面各环节。“分散的”与党中央集中统一领导原则相违背，因此选A、C、D。"}, {"id": 117, "num": "54", "section": "multi", "type": "多选", "question": "对美好生活的向往，只有通过劳动才能实现，发展中的各种难题，只有通过劳动才能破解。坚持（　），让所有劳动者在推动发展中分享发展成果，是保障和改善民生的重要原则。", "options": {"A": "人人享有", "B": "尽力而为", "C": "量力而行", "D": "人人尽责"}, "answer": "AD", "explanation": "解析：题干强调通过劳动创造美好生活、破解发展难题，对应保障和改善民生中“人人尽责、人人享有”的原则。尽力而为、量力而行也是民生建设的重要要求，但不属于本题关于劳动和成果共享的固定表述，因此选A、D。"}, {"id": 118, "num": "1", "section": "judge", "type": "判断", "question": "中国特色社会主义，既坚持了科学社会主义基本原则，又根据时代条件赋予其鲜明的中国特色。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 119, "num": "2", "section": "judge", "type": "判断", "question": "改革开放前的社会主义实践探索为改革开放后的社会主义实践探索积累了条件，改革开放后的社会主义实践探索是对前一个时期的坚持、改革、发展。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 120, "num": "3", "section": "judge", "type": "判断", "question": "绿水青山可带来金山银山，金山银山也可买到绿水青山。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 121, "num": "4", "section": "judge", "type": "判断", "question": "坚持党作为最高政治领导力量，对于实现中华民族伟大复兴具有根本性意义。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 122, "num": "5", "section": "judge", "type": "判断", "question": "高质量发展是新时代我国经济社会发展的鲜明主题，是全面建设社会主义现代化国家的首要任务。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 123, "num": "6", "section": "judge", "type": "判断", "question": "新时代全面深化改革开放，就其艰巨性、复杂性和系统性来说，是一场深刻的革命。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 124, "num": "7", "section": "judge", "type": "判断", "question": "意识形态关乎旗帜、关乎道路、关乎国家政治安全，决定文化前进方向和发展道路。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 125, "num": "8", "section": "judge", "type": "判断", "question": "能打胜仗是人民军队的建军之本、强军之魂。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 126, "num": "9", "section": "judge", "type": "判断", "question": "坚持全民共享、全面共享、共建共享、渐进共享，使全体人民有更多获得感、幸福感、安全感，朝着共同富裕方向稳步前进。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 127, "num": "10", "section": "judge", "type": "判断", "question": "进一步全面深化改革，要抓住重点，突出经济体制改革，突出战略性、全局性重大改革，突出政治体制改革牵引作用，凸显改革引领作用。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 128, "num": "11", "section": "judge", "type": "判断", "question": "周边是我国安身立命之所、发展繁荣之基。无论从地理方位、自然环境还是相互关系看，周边对我国都具有极为重要的战略意义。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 129, "num": "12", "section": "judge", "type": "判断", "question": "国防和军队建设是捍卫国家主权、安全、发展利益的坚强后盾。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 130, "num": "13", "section": "judge", "type": "判断", "question": "党的领导是中国特色社会主义法治之魂，是我们的法治同西方资本主义国家的法治最大的区别。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 131, "num": "14", "section": "judge", "type": "判断", "question": "教育优先发展重在夯实人力资源深度开发基础，科技自立自强重在坚持独立自主开拓创新，人才引领驱动重在巩固发展优势赢得竞争主动。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 132, "num": "15", "section": "judge", "type": "判断", "question": "人民军队是执行党的政治任务的武装集团，党和人民所需就是军队使命任务所系。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 133, "num": "16", "section": "judge", "type": "判断", "question": "高质量发展是全面建设社会主义现代化国家的首要任务，是遵循经济规律发展的必然要求。推动高质量发展，必须以新发展理念为引领，深入推进发展方式、发展动力、发展领域、发展质量变革，实现更高质量、更有效率、更加公平、更可持续、更为安全的发展。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 134, "num": "17", "section": "judge", "type": "判断", "question": "中国共产党作为以马克思主义为指导的无产阶级政党，代表部分利益集团、权势团体、特权阶层的利益。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 135, "num": "18", "section": "judge", "type": "判断", "question": "全面深化改革总目标是：完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化。这一总目标是一个内涵丰富的有机整体，两句话都讲，才是完整的、全面的。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 136, "num": "19", "section": "judge", "type": "判断", "question": "中华民族创造的优秀传统文化是民族的根脉，根植在中国人内心，形成了中国人看待世界、看待社会、看待人生的独特价值体系、文化内涵和精神品质，这是我们区别于其他国家和民族的根本特征，也铸就了中华民族一以贯之的文化自信。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 137, "num": "20", "section": "judge", "type": "判断", "question": "当今世界，各种思想文化相互激荡，文化在综合国力竞争中的地位和作用更加凸显。谁拥有了强大的文化软实力，谁就能够在激荡的国际竞争中掌握主动权、话语权。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 138, "num": "21", "section": "judge", "type": "判断", "question": "作风优良是保证，关系军队的性质、宗旨、本色。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 139, "num": "22", "section": "judge", "type": "判断", "question": "全过程人民民主是社会主义民主政治的本质属性。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 140, "num": "23", "section": "judge", "type": "判断", "question": "坚持人民当家作主是中国特色社会主义制度的最大优势，是党和国家各项事业发展的根本政治保证。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 141, "num": "24", "section": "judge", "type": "判断", "question": "立德树人是发展教育的根本尺度。加快建设教育强国，最终是办好人民满意的教育。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 142, "num": "25", "section": "judge", "type": "判断", "question": "解放和发展社会生产力，是新时代全面深化改革开放的思想前提，也是社会主义改革的内在要求和基本目的。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 143, "num": "26", "section": "judge", "type": "判断", "question": "处理好绿水青山和金山银山的关系，关键在人，关键在思路。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 144, "num": "27", "section": "judge", "type": "判断", "question": "优化国土空间开发布局，严守生态保护红线、环境质量底线、资源利用上线三条红线，以国家重点生态功能区为支撑，实施全国重要生态系统保护和修复重大工程，筑牢国家生态安全屏障。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 145, "num": "28", "section": "judge", "type": "判断", "question": "中国共产党的自身优势是中国特色社会主义制度优势的主要来源。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 146, "num": "29", "section": "judge", "type": "判断", "question": "增进民生福祉是坚持立党为公、执政为民的本质要求，是社会主义生产的根本目的，是全面建设社会主义现代化国家的应有之义。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 147, "num": "30", "section": "judge", "type": "判断", "question": "人民民主是社会主义的生命，没有民主就没有社会主义。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 148, "num": "31", "section": "judge", "type": "判断", "question": "我们党领导人民进行社会主义建设，有改革开放前和改革开放后两个历史时期，这是两个相互联系又有重大区别的时期，是根本不同的社会主义建设的实践探索。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 149, "num": "32", "section": "judge", "type": "判断", "question": "香港坚持以行政长官为核心的行政主导体制，支持行政长官和特别行政区政府依法施政、积极作为。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 150, "num": "33", "section": "judge", "type": "判断", "question": "落实立德树人根本任务，必须着力解决好培养什么人、怎样培养人、为谁培养人的问题，这是教育的根本问题，也是建设教育强国的核心课题。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 151, "num": "34", "section": "judge", "type": "判断", "question": "发展和安全是两件大事，安全解决的是动力问题，发展解决的是保障问题，必须同步推进。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 152, "num": "35", "section": "judge", "type": "判断", "question": "没有网络安全就没有国家安全，就没有经济社会稳定运行，广大人民群众利益也难以得到保障。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 153, "num": "36", "section": "judge", "type": "判断", "question": "中国特色社会主义法治道路的核心要义，就是要坚持党的领导，坚持中国特色社会主义制度，贯彻中国特色社会主义法治理论。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 154, "num": "37", "section": "judge", "type": "判断", "question": "解决人民群众最关心最直接最现实的利益问题，是保障和改善民生的重中之重。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 155, "num": "38", "section": "judge", "type": "判断", "question": "良好的生态环境是最公平的公共产品，是最普惠的民生福祉。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 156, "num": "39", "section": "judge", "type": "判断", "question": "道路问题是关系党的事业兴衰成败第一位的问题。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": er": "T", "explanation": ""}, {"id": 167, "num": "50", "section": "judge", "type": "判断", "question": "能打胜仗是核心，反映军队的根本职能和军队建设的根本指向。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 168, "num": "51", "section": "judge", "type": "判断", "question": "政治上坚强根源于思想上坚定，意志上凝聚决定于认识上统一。加强思想教育和理论武装，是党内政治生活的首要任务，是保证全党步调一致的前提。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 169, "num": "52", "section": "judge", "type": "判断", "question": "党的作风就是党的形象，关系人心向背，关系党的生死存亡。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 170, "num": "53", "section": "judge", "type": "判断", "question": "中国共产党根基在人民、血脉在人民、力量在人民。人民是我们党的生命之根、执政之基、力量之源。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 171, "num": "54", "section": "judge", "type": "判断", "question": "依法治港治澳，是全面依法治国的应有之义，是全面准确贯彻“一国两制”方针的必由之路。宪法和国家安全法共同构成特别行政区的宪制基础。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 172, "num": "55", "section": "judge", "type": "判断", "question": "全面建成小康社会，高质量完成了社会主义现代化建设“三步走”战略的第一步，使中华民族伟大复兴向前迈出新的一大步。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 173, "num": "56", "section": "judge", "type": "判断", "question": "中国走和平发展道路，不是权宜之计，更不是外交辞令，而是从历史、现实、未来的客观判断中得出的结论，是思想自信和实践自觉的有机统一。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 174, "num": "57", "section": "judge", "type": "判断", "question": "中国共产党的根本政治立场是人民立场，这意味着党在任何时候都要把人民利益放在首位，没有自己的特殊利益。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 175, "num": "58", "section": "judge", "type": "判断", "question": "教育是国家经济社会发展的支撑力量，在国家发展中始终具有基础性、先导性、全局性地位。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 176, "num": "59", "section": "judge", "type": "判断", "question": "发展是解决民生问题的“总钥匙”，民生是发展的“指南针”。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 177, "num": "60", "section": "judge", "type": "判断", "question": "不能用单一的标尺衡量世界丰富多彩的政治制度，不能用单调的眼光审视人类五彩缤纷的政治文明，政治制度是在国家历史传承、文化传统、经济社会发展的基础上发展的结果，可以搬来一座政治制度上的“飞来峰”。", "options": {"T": "正确", "F": "错误"}, "answer": "F", "explanation": ""}, {"id": 178, "num": "61", "section": "judge", "type": "判断", "question": "中国外交秉持亲诚惠容的周边外交理念，着力深化互利共赢格局，找准同周边国家互利合作的战略契合点，构建区域经济一体化新格局。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}, {"id": 179, "num": "62", "section": "judge", "type": "判断", "question": "人民在一个国家的地位是由这个国家的政权性质决定的。", "options": {"T": "正确", "F": "错误"}, "answer": "T", "explanation": ""}];

</script>
<script>

(function(){
  "use strict";

  const BANK = window.QUESTION_BANK || [];
  const STORE_KEY = "xigai_quiz_netlify_v1";
  let state = loadState();
  let list = [];
  let pos = 0;
  let selected = new Set();
  let locked = false;
  let shuffled = false;

  const $ = id => document.getElementById(id);

  function defaultState(){
    return {
      mode:"all",
      order:BANK.map(q=>q.id),
      currentId:BANK[0]?.id || 1,
      results:{},
      wrongIds:[],
      favIds:[]
    };
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return defaultState();
      const s = Object.assign(defaultState(), JSON.parse(raw));
      s.results = s.results || {};
      s.wrongIds = Array.isArray(s.wrongIds) ? s.wrongIds : [];
      s.favIds = Array.isArray(s.favIds) ? s.favIds : [];
      s.order = Array.isArray(s.order) && s.order.length ? s.order : BANK.map(q=>q.id);
      return s;
    }catch(e){ return defaultState(); }
  }
  function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  function byId(id){ return BANK.find(q => q.id === Number(id)); }
  function normalize(s){
    s = String(s || "").replace(/T/g,"对").replace(/F/g,"错").replace(/√/g,"对").replace(/×/g,"错");
    const arr = s.match(/[A-D对错]/g);
    if(!arr) return "";
    return arr.sort().join("");
  }
  function typeName(q){
    if(q.section === "single") return "单选";
    if(q.section === "multi") return "多选";
    if(q.section === "judge") return "判断";
    return q.type || "题目";
  }
  function escapeHTML(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  function buildList(){
    let ids = state.order.slice();
    let arr = ids.map(byId).filter(Boolean);
    if(state.mode === "single") arr = arr.filter(q => q.section === "single");
    if(state.mode === "multi") arr = arr.filter(q => q.section === "multi");
    if(state.mode === "judge") arr = arr.filter(q => q.section === "judge");
    if(state.mode === "wrong") arr = arr.filter(q => state.wrongIds.includes(q.id));
    if(state.mode === "fav") arr = arr.filter(q => state.favIds.includes(q.id));
    list = arr;
    const found = list.findIndex(q => q.id === state.currentId);
    pos = found >= 0 ? found : 0;
  }

  function render(){
    buildList();
    selected.clear();
    locked = false;
    $("feedback").className = "feedback";
    $("feedback").style.display = "none";
    $("multiActions").classList.remove("show");

    $("subtitle").textContent = `共 ${BANK.length} 题｜单选 ${BANK.filter(q=>q.section==="single").length}｜多选 ${BANK.filter(q=>q.section==="multi").length}｜判断 ${BANK.filter(q=>q.section==="judge").length}`;

    if(!list.length){
      $("typeTag").textContent = "空列表";
      $("counter").textContent = "0 / 0";
      $("bar").style.width = "0%";
      $("question").innerHTML = `<div class="empty">当前列表没有题目。可以在右上角菜单切换题型，或清空进度后重新练习。</div>`;
      $("options").innerHTML = "";
      updateStats();
      return;
    }
    if(pos < 0) pos = list.length - 1;
    if(pos >= list.length) pos = 0;
    const q = list[pos];
    state.currentId = q.id;
    save();

    $("typeTag").textContent = `${typeName(q)} · 原题号 ${q.num}`;
    $("counter").textContent = `${pos + 1} / ${list.length}`;
    $("bar").style.width = `${((pos + 1) / list.length * 100).toFixed(1)}%`;
    $("question").textContent = q.question || "（题干缺失）";
    $("jumpInput").max = String(list.length);
    $("jumpInput").value = String(pos + 1);

    const opts = q.options || {};
    $("options").innerHTML = Object.keys(opts).map(letter => `
      <button class="opt" data-letter="${escapeHTML(letter)}">
        <span class="letter">${escapeHTML(letter)}.</span>
        <span>${escapeHTML(opts[letter])}</span>
      </button>
    `).join("");

    Array.from($("options").querySelectorAll(".opt")).forEach(btn => {
      btn.addEventListener("click", () => choose(btn.dataset.letter, btn));
    });

    if(q.section === "multi") $("multiActions").classList.add("show");
    updateStats();
  }

  function updateStats(){
    const vals = Object.values(state.results);
    const done = vals.length;
    const right = vals.filter(v => v.correct).length;
    const wrong = vals.filter(v => !v.correct).length;
    $("statDone").textContent = done;
    $("statRight").textContent = right;
    $("statWrong").textContent = wrong;
    $("statRate").textContent = done ? Math.round(right / done * 100) + "%" : "0%";
  }

  function choose(letter, btn){
    if(locked || !list.length) return;
    const q = list[pos];
    if(q.section === "multi"){
      if(selected.has(letter)){
        selected.delete(letter);
        btn.classList.remove("selected");
      }else{
        selected.add(letter);
        btn.classList.add("selected");
      }
      return;
    }
    judge([letter]);
  }

  function submitMulti(){
    if(!selected.size || locked) return;
    judge(Array.from(selected));
  }

  function judge(picked){
    const q = list[pos];
    const answer = normalize(q.answer);
    const pickedNorm = normalize(picked.join(""));
    const correct = pickedNorm === answer;
    locked = true;

    state.results[q.id] = {
      correct,
      picked: picked.slice(),
      at: Date.now()
    };
    if(correct){
      state.wrongIds = state.wrongIds.filter(id => id !== q.id);
    }else if(!state.wrongIds.includes(q.id)){
      state.wrongIds.push(q.id);
    }
    save();

    markOptions(picked, answer);
    if(correct){
      showFeedback(true, "回答正确，自动进入下一题。");
      setTimeout(() => next(true), 450);
    }else{
      showFeedback(false, `回答错误\n正确答案：${q.answer}\n\n${q.explanation || "暂无解析"}`);
    }
    updateStats();
  }

  function markOptions(picked, answer){
    Array.from($("options").querySelectorAll(".opt")).forEach(btn => {
      const l = btn.dataset.letter;
      if(answer.includes(normalize(l))) btn.classList.add("correct");
      if(picked.includes(l) && !answer.includes(normalize(l))) btn.classList.add("wrong");
    });
  }

  function showFeedback(good, text){
    $("feedback").className = "feedback " + (good ? "good" : "bad");
    $("feedback").textContent = text;
    $("feedback").style.display = "block";
  }

  function showAnswer(){
    if(!list.length) return;
    const q = list[pos];
    locked = true;
    markOptions([], normalize(q.answer));
    showFeedback(false, `正确答案：${q.answer}\n\n${q.explanation || "暂无解析"}`);
  }

  function next(auto){
    if(!list.length) return;
    $("card").classList.add("slideLeft");
    setTimeout(() => {
      pos = (pos + 1) % list.length;
      state.currentId = list[pos].id;
      $("card").classList.remove("slideLeft");
      render();
    }, auto ? 100 : 150);
  }
  function prev(){
    if(!list.length) return;
    $("card").classList.add("slideRight");
    setTimeout(() => {
      pos = (pos - 1 + list.length) % list.length;
      state.currentId = list[pos].id;
      $("card").classList.remove("slideRight");
      render();
    }, 150);
  }

  function openDrawer(){
    $("drawer").classList.add("open");
    $("drawer").setAttribute("aria-hidden","false");
    $("mode").value = state.mode;
    updateStats();
  }
  function closeDrawer(){
    $("drawer").classList.remove("open");
    $("drawer").setAttribute("aria-hidden","true");
  }

  function shuffle(){
    for(let i = state.order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
    }
    shuffled = true;
    pos = 0;
    state.currentId = state.order[0];
    save();
    render();
  }

  function order(){
    state.order = BANK.map(q => q.id);
    shuffled = false;
    pos = 0;
    state.currentId = 1;
    save();
    render();
  }

  function toggleFav(){
    if(!list.length) return;
    const id = list[pos].id;
    if(state.favIds.includes(id)){
      state.favIds = state.favIds.filter(x => x !== id);
      $("favBtn").textContent = "收藏本题";
    }else{
      state.favIds.push(id);
      $("favBtn").textContent = "取消收藏";
    }
    save();
    updateStats();
  }

  function jump(){
    const n = Number($("jumpInput").value);
    if(n >= 1 && n <= list.length){
      pos = n - 1;
      state.currentId = list[pos].id;
      save();
      closeDrawer();
      render();
    }
  }

  function resetAll(){
    if(!confirm("确定清空进度、错题和收藏吗？")) return;
    state = defaultState();
    save();
    closeDrawer();
    render();
  }

  // touch swipe
  let startX = 0, startY = 0, tracking = false;
  $("stage").addEventListener("touchstart", e => {
    const t = e.changedTouches[0];
    startX = t.clientX; startY = t.clientY; tracking = true;
  }, {passive:true});
  $("stage").addEventListener("touchend", e => {
    if(!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4){
      if(dx < 0) next(false);
      else prev();
    }
  }, {passive:true});

  // events
  $("prevBtn").addEventListener("click", prev);
  $("nextBtn").addEventListener("click", () => next(false));
  $("wrongBtn").addEventListener("click", () => { state.mode = "wrong"; closeDrawer(); render(); });
  $("submitBtn").addEventListener("click", submitMulti);
  $("clearPickBtn").addEventListener("click", () => {
    selected.clear();
    Array.from($("options").querySelectorAll(".opt")).forEach(b => b.classList.remove("selected"));
  });
  $("menuBtn").addEventListener("click", openDrawer);
  $("closeDrawer").addEventListener("click", closeDrawer);
  $("drawer").addEventListener("click", e => { if(e.target.id === "drawer") closeDrawer(); });
  $("mode").addEventListener("change", e => { state.mode = e.target.value; pos = 0; closeDrawer(); render(); save(); });
  $("shuffleBtn").addEventListener("click", () => { closeDrawer(); shuffle(); });
  $("orderBtn").addEventListener("click", () => { closeDrawer(); order(); });
  $("favBtn").addEventListener("click", toggleFav);
  $("showAnswerBtn").addEventListener("click", () => { closeDrawer(); showAnswer(); });
  $("jumpBtn").addEventListener("click", jump);
  $("resetBtn").addEventListener("click", resetAll);

  document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") next(false);
    if(e.key === "ArrowLeft") prev();
    const k = e.key.toUpperCase();
    if(["A","B","C","D"].includes(k)){
      const btn = $("options").querySelector(`.opt[data-letter="${k}"]`);
      if(btn) btn.click();
    }
    if(e.key === "Enter" && list[pos]?.section === "multi") submitMulti();
  });

  render();
})();

</script>
</body>
</html>
